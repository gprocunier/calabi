---
# Operator-provided volume group that backs all guest logical volumes.
on_prem_lvm_volume_group: calabi_lab_vg
on_prem_lvm_lv_name_prefix: ""
on_prem_lvm_guest_symlink_root: /dev/ebs

# The on-prem target still expects the hypervisor to be reachable from the
# bastion on the lab management network as ec2-user@172.16.0.1, matching the
# stock support-service handoff model.
