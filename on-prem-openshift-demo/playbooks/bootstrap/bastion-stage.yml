---
- name: Stage the project and lab execution inputs onto the bastion
  hosts: aws_metal
  become: false
  gather_facts: false
  vars:
    bastion_stage_project_lab_credentials_path: >-
      {{ lab_execution_project_root }}/inventory/group_vars/all/
      lab_credentials.yml
    bastion_stage_manager_lab_credentials_path: >-
      {{ lookup('env', 'HOME') }}/.local/state/calabi-manager/secrets/
      lab_credentials.yml
  vars_files:
    - ../../../aws-metal-openshift-demo/vars/guests/bastion_vm.yml
    - >-
      ../../../aws-metal-openshift-demo/vars/cluster/openshift_install_cluster.yml
    - ../../../aws-metal-openshift-demo/vars/global/execution_environment.yml
    - ../../../aws-metal-openshift-demo/vars/global/name_resolution.yml

  pre_tasks:
    - name: Load optional project-local lab credentials for bastion bootstrap
      ansible.builtin.set_fact:
        bastion_stage_bootstrap_project_lab_credentials: >-
          {{
            (
              lookup(
                'file',
                bastion_stage_project_lab_credentials_path,
                errors='ignore'
              )
              | default('', true)
              | trim
            ) | from_yaml
          }}
      when:
        - >-
          (
            lookup(
              'file',
              bastion_stage_project_lab_credentials_path,
              errors='ignore'
            )
            | default('', true)
            | trim
          ) | length > 0

    - name: Load optional calabi-manager lab credentials for bastion bootstrap
      ansible.builtin.set_fact:
        bastion_stage_bootstrap_manager_lab_credentials: >-
          {{
            (
              lookup(
                'file',
                bastion_stage_manager_lab_credentials_path,
                errors='ignore'
              )
              | default('', true)
              | trim
            ) | from_yaml
          }}
      when:
        - >-
          (
            lookup(
              'file',
              bastion_stage_manager_lab_credentials_path,
              errors='ignore'
            )
            | default('', true)
            | trim
          ) | length > 0

    - name: Derive the bootstrap lab default password for bastion staging
      ansible.builtin.set_fact:
        lab_default_password: >-
          {{
            lab_default_password
            | default(
              bastion_stage_bootstrap_project_lab_credentials
              .lab_default_password
              | default(
                bastion_stage_bootstrap_manager_lab_credentials
                .lab_default_password
                | default('', true),
                true
              ),
              true
            )
          }}

    - name: Register the bastion host as a temporary Ansible host
      ansible.builtin.add_host:
        name: bastion_stage_target
        groups:
          - bastion_stage_hosts
        ansible_host: "{{ bastion_vm.network.ipv4_address }}"
        ansible_user: "{{ bastion_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ bastion_client.controller_ssh_private_key_file }}
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -o ProxyCommand="ssh -i {{
          hostvars[inventory_hostname].ansible_ssh_private_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{
          hostvars[inventory_hostname].ansible_user }}@{{
          hostvars[inventory_hostname].ansible_host }} -W %h:%p"

    - name: Wait for the bastion guest to accept SSH connections
      ansible.builtin.wait_for:
        host: "{{ bastion_vm.network.ipv4_address }}"
        port: 22
        timeout: 900
        sleep: 10

- name: Prepare the bastion as the on-prem lab execution host
  hosts: bastion_stage_hosts
  become: true
  gather_facts: false
  vars_files:
    - ../../../aws-metal-openshift-demo/vars/guests/bastion_vm.yml
  vars:
    on_prem_bastion_stage_remote_stock_root: >-
      {{ bastion_client.project_parent }}/aws-metal-openshift-demo
  tasks:
    - name: Ensure the staged stock AWS-target root exists
      ansible.builtin.file:
        path: "{{ on_prem_bastion_stage_remote_stock_root }}"
        state: directory
        owner: "{{ bastion_vm.access.admin_user }}"
        group: "{{ bastion_vm.access.admin_user }}"
        mode: "0755"

- name: Synchronize the stock AWS-target subtree onto the bastion
  hosts: aws_metal
  become: false
  gather_facts: false
  vars_files:
    - ../../../aws-metal-openshift-demo/vars/guests/bastion_vm.yml
    - ../../../aws-metal-openshift-demo/vars/global/execution_environment.yml
  vars:
    on_prem_bastion_stage_source_stock_root: >-
      {{ lab_execution_project_root | dirname }}/aws-metal-openshift-demo
    on_prem_bastion_stage_remote_stock_root: >-
      {{ bastion_client.project_parent }}/aws-metal-openshift-demo
  tasks:
    - name: Validate the local stock AWS-target staging root
      ansible.builtin.stat:
        path: "{{ on_prem_bastion_stage_source_stock_root }}"
      delegate_to: localhost
      become: false
      register: on_prem_bastion_stage_stock_root_stat

    - name: Fail when the local stock AWS-target staging root is missing
      ansible.builtin.assert:
        that:
          - on_prem_bastion_stage_stock_root_stat.stat.exists
        fail_msg: >-
          Stock AWS-target project root {{
          on_prem_bastion_stage_source_stock_root }} was not found on the
          bootstrap controller.

    - name: >-
        Synchronize the stock AWS-target subtree while preserving generated
        content
      ansible.builtin.command:
        argv:
          - rsync
          - -a
          - --itemize-changes
          - --delete
          - --exclude=.git
          - --exclude=generated
          - --exclude=secrets
          - --exclude=__pycache__
          - --exclude=.ansible
          - --rsync-path=sudo rsync
          - -e
          - >-
            ssh -i {{ bastion_client.controller_ssh_private_key_file }}
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
            -o ProxyCommand="ssh -i {{
            hostvars[inventory_hostname].ansible_ssh_private_key_file }}
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null {{
            hostvars[inventory_hostname].ansible_user }}@{{
            hostvars[inventory_hostname].ansible_host }} -W %h:%p"
          - "{{ on_prem_bastion_stage_source_stock_root }}/"
          - >-
            {{ bastion_vm.access.admin_user }}@{{
            bastion_vm.network.ipv4_address }}:{{
            on_prem_bastion_stage_remote_stock_root }}/
      register: on_prem_bastion_stage_stock_sync
      changed_when: on_prem_bastion_stage_stock_sync.stdout | trim | length > 0
      delegate_to: localhost
      become: false

- name: Prepare the bastion as the on-prem lab execution host
  hosts: bastion_stage_hosts
  become: true
  gather_facts: true
  vars_files:
    - ../../../aws-metal-openshift-demo/vars/guests/bastion_vm.yml
    - ../../../aws-metal-openshift-demo/vars/guests/idm_vm.yml
    - ../../../aws-metal-openshift-demo/vars/guests/mirror_registry_vm.yml
    - >-
      ../../../aws-metal-openshift-demo/vars/cluster/openshift_install_cluster.yml
    - ../../../aws-metal-openshift-demo/vars/global/execution_environment.yml
    - ../../../aws-metal-openshift-demo/vars/global/mirror_content.yml
    - ../../../aws-metal-openshift-demo/vars/global/name_resolution.yml
  vars:
    on_prem_bastion_stage_remote_project_root: >-
      {{ bastion_client.project_parent }}/on-prem-openshift-demo
    on_prem_bastion_client_overrides:
      project_root: "{{ on_prem_bastion_stage_remote_project_root }}"
      workspace_root: "{{ on_prem_bastion_stage_remote_project_root }}"
      artifact_root: "{{ bastion_client.project_parent }}/aws-metal-openshift-demo/generated"
      cluster_artifact_root: >-
        {{ bastion_client.project_parent }}/aws-metal-openshift-demo/generated/ocp
      tools_root: >-
        {{ bastion_client.project_parent }}/aws-metal-openshift-demo/generated/tools
    bastion_client: >-
      {{
        bastion_client | combine(
          on_prem_bastion_client_overrides,
          recursive=True
        )
      }}
  roles:
    - role: on_prem_bastion_stage
    - role: lab_name_resolution

- name: Render bastion-side hypervisor inventory for the on-prem runtime path
  hosts: bastion_stage_hosts
  become: true
  gather_facts: false
  vars_files:
    - ../../../aws-metal-openshift-demo/vars/guests/bastion_vm.yml
    - ../../../aws-metal-openshift-demo/vars/global/execution_environment.yml
  vars:
    on_prem_bastion_stage_hypervisor_inventory_host: >-
      {{ (groups['aws_metal'] | default([])) | first | default('') }}
    on_prem_bastion_stage_remote_project_root: >-
      {{ bastion_client.project_parent }}/on-prem-openshift-demo
    on_prem_bastion_stage_runtime_hypervisor_host: >-
      {{
        hostvars[on_prem_bastion_stage_hypervisor_inventory_host]
        .on_prem_bastion_hypervisor_host
        | default('172.16.0.1')
      }}
    on_prem_bastion_stage_runtime_hypervisor_user: >-
      {{
        hostvars[on_prem_bastion_stage_hypervisor_inventory_host]
        .on_prem_bastion_hypervisor_user
        | default(
          hostvars[on_prem_bastion_stage_hypervisor_inventory_host]
          .ansible_user
        )
      }}
    on_prem_bastion_stage_runtime_inventory: |
      ---
      all:
        children:
          aws_metal:
            hosts:
              metal-01:
                ansible_host: >-
                  {{ on_prem_bastion_stage_runtime_hypervisor_host }}
                ansible_user: {{
                  on_prem_bastion_stage_runtime_hypervisor_user
                }}
                ansible_ssh_private_key_file: >-
                  {{ bastion_client.project_root }}/secrets/id_ed25519
                ansible_ssh_common_args: >-
                  -o StrictHostKeyChecking=no
                  -o UserKnownHostsFile=/dev/null
    on_prem_bastion_stage_runtime_inventory_targets:
      - "{{ on_prem_bastion_stage_remote_project_root }}/inventory/hosts.yml"
      - "{{ bastion_client.project_parent }}/aws-metal-openshift-demo/inventory/hosts.yml"
  tasks:
    - name: Validate the on-prem hypervisor inventory host exists
      ansible.builtin.assert:
        that:
          - on_prem_bastion_stage_hypervisor_inventory_host | length > 0
        fail_msg: >-
          The on-prem bastion-stage wrapper requires an aws_metal inventory
          host so it can render the bastion-side hypervisor inventory.

    - name: >-
        Write the bastion-side hypervisor inventory for both staged project
        trees
      ansible.builtin.copy:
        dest: "{{ item }}"
        content: "{{ on_prem_bastion_stage_runtime_inventory }}"
        owner: "{{ bastion_vm.access.admin_user }}"
        group: "{{ bastion_vm.access.admin_user }}"
        mode: "0644"
      loop: "{{ on_prem_bastion_stage_runtime_inventory_targets }}"
