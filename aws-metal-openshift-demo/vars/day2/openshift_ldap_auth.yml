---
openshift_ldap_auth_defaults:
  identity_provider_name: "Red Hat Identity Management"
  manage_identity_provider: false
  manage_group_sync: true
  run_login_smoke_test: false
  bind_dn: "cn=Directory Manager"
  bind_password: "{{ idm_server.ds_password }}"
  user_search_base_dn: ""
  group_search_base_dn: ""
  login_url: ""
  oauth:
    mapping_method: claim
    insecure: false
    attributes:
      id:
        - dn
      preferred_username:
        - uid
      name:
        - cn
      email:
        - mail
  group_sync:
    schedule: "*/30 * * * *"
    whitelist_groups:
      - access-openshift-admin
      - access-virt-admin
      - access-developer
    rfc2307:
      groups_filter: "(objectClass=groupOfNames)"
      users_filter: "(objectClass=person)"
  authorization:
    cluster_admin_group: access-openshift-admin

openshift_ldap_auth: "{{ openshift_ldap_auth_defaults }}"
