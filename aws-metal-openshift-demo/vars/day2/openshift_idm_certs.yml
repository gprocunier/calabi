---
openshift_idm_certs_defaults:
  ingress:
    secret_name: ingress-default-idm-tls
    service_principal: HTTP/apps.ocp.workshop.lan
    common_name: apps.ocp.workshop.lan
    wildcard_name: "*.apps.ocp.workshop.lan"
  ingress_profile:
    id: ocpWildcardIngress
    description: OpenShift wildcard ingress certificate profile

openshift_idm_certs: "{{ openshift_idm_certs_defaults }}"
