---
# Paths in this file are evaluated on the managed hypervisor host.
mirror_registry_reset_storage_requested: false

mirror_registry_vm:
  name: mirror-registry
  domain: workshop.lan
  source_image: /root/images/rhel-10.1-x86_64-kvm.qcow2
  disk_path: /dev/ebs/mirror-registry
  osinfo: rhel10.1
  provisioning:
    rebuild_disk_from_image: false
    recreate_domain: false
  boot:
    firmware: uefi
    machine: q35
    cpu_model: host-passthrough
    tpm_enabled: false
  resources:
    memory_mb: 16384
    vcpus: 4
  performance_domain:
    tier: bronze
    iothreads: 1
  network:
    libvirt_network: lab-switch
    libvirt_portgroup: mgmt-access
    interface_name: eth0
    mac_address: "52:54:00:50:01:03"
    ipv4_address: 172.16.0.20
    prefix_length: 24
    gateway: 172.16.0.1
    dns_servers:
      - 172.16.0.10
      - 8.8.8.8
  access:
    admin_user: cloud-user
    admin_password: "{{ lab_default_password }}"
    ssh_private_key_file: >-
      {{ lab_execution_ssh_private_key_file |
      default(lookup('env', 'HOME') + '/.ssh/id_ed25519') }}
    lock_password: false
    ssh_password_auth: true
    ssh_authorized_keys: >-
      {{
        [lab_operator_ssh_public_key | default('')]
        | reject('equalto', '')
        | list
      }}
  subscription:
    enabled: true
    activation_key: "{{ lab_rhsm.activation_key | default('') }}"
    organization_id: "{{ lab_rhsm.organization_id | default('') }}"
    username: "{{ lab_rhsm.username | default('') }}"
    password: "{{ lab_rhsm.password | default('') }}"
    server_hostname: "{{ lab_rhsm.server_hostname | default('') }}"

mirror_registry_client:
  admin_principal: admin
  packages:
    - cockpit
    - firewalld
    - ipa-client
    - certmonger
  firewall_services:
    - cockpit

mirror_registry_service:
  install_enabled: true
  reset_storage: false
  registry_port: 8443
  init_user: init
  init_email: ""
  init_password: "{{ lab_default_password }}"
  use_idm_cert: true
  quay_root: /opt/quay-install
  workspace_root: /opt/openshift
  download_root: /var/lib/mirror-registry/downloads
  extract_root: /var/lib/mirror-registry/extracted
  bundle_root: /usr/local/libexec/mirror-registry
  cert_dir: /opt/quay-install/quay-config
  cert_path: /opt/quay-install/quay-config/ssl.cert
  key_path: /opt/quay-install/quay-config/ssl.key
  managed_cert_path: ""
  managed_key_path: ""
  idm_ca_path: /etc/ipa/ca.crt
  cert_request_id: mirror-registry-quay
  auth_file: /root/.config/containers/auth.json
  pull_secret_file: /opt/openshift/pull-secret.json
  oc_mirror_binary: /usr/local/bin/oc-mirror
  storage_volumes:
    - quay-storage
    - sqlite-storage
  storage_owner: "1001"
  storage_group: "0"
  storage_mode: "0775"
  packages:
    - ca-certificates
    - curl
    - firewalld
    - jq
    - openssl
    - podman
    - tar
  firewall_ports:
    - 8443/tcp
  downloads:
    mirror_registry:
      url: >-
        https://mirror.openshift.com/pub/cgw/mirror-registry/latest/mirror-registry-amd64.tar.gz
      archive: mirror-registry-amd64.tar.gz
      bundle_files:
        - mirror-registry
        - execution-environment.tar
        - image-archive.tar
        - sqlite3.tar
    openshift_client:
      url: >-
        https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/{{
        mirror_registry_ocp_release }}/openshift-client-linux-{{
        mirror_registry_ocp_release }}.tar.gz
      archive: "openshift-client-linux-{{ mirror_registry_ocp_release }}.tar.gz"
      binaries:
        - oc
        - kubectl
    oc_mirror:
      url: >-
        https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/{{
        mirror_registry_ocp_release }}/oc-mirror.rhel9.tar.gz
      archive: oc-mirror.rhel9.tar.gz
      binary_name: oc-mirror
