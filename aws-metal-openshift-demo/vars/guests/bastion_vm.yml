---
# Paths in this file are evaluated on the managed hypervisor host.
bastion_vm:
  name: bastion-01
  domain: workshop.lan
  source_image: /root/images/rhel-10.1-x86_64-kvm.qcow2
  disk_path: /dev/ebs/bastion-01
  osinfo: rhel10.1
  provisioning:
    rebuild_disk_from_image: false
    recreate_domain: false
  boot:
    firmware: uefi
    machine: q35
    cpu_model: host-passthrough
    tpm_enabled: false
  resources:
    memory_mb: 8192
    vcpus: 4
  performance_domain:
    tier: bronze
    iothreads: 0
  network:
    libvirt_network: lab-switch
    libvirt_portgroup: mgmt-access
    interface_name: eth0
    mac_address: "52:54:00:50:01:04"
    ipv4_address: 172.16.0.30
    prefix_length: 24
    gateway: 172.16.0.1
    dns_servers:
      - 172.16.0.10
      - 8.8.8.8
  access:
    admin_user: cloud-user
    admin_password: "{{ lab_default_password | default('') }}"
    ssh_private_key_file: >-
      {{ lab_execution_ssh_private_key_file |
      default(lookup('env', 'HOME') + '/.ssh/id_ed25519') }}
    lock_password: false
    ssh_password_auth: true
    ssh_authorized_keys: >-
      {{
        [lab_operator_ssh_public_key | default('')]
        | reject('equalto', '')
        | list
      }}
  subscription:
    enabled: true
    activation_key: "{{ lab_rhsm.activation_key | default('') }}"
    organization_id: "{{ lab_rhsm.organization_id | default('') }}"
    username: "{{ lab_rhsm.username | default('') }}"
    password: "{{ lab_rhsm.password | default('') }}"
    server_hostname: "{{ lab_rhsm.server_hostname | default('') }}"

bastion_client:
  admin_principal: admin
  packages:
    - ansible-core
    - bind-utils
    - cockpit
    - cockpit-files
    - cockpit-packagekit
    - cockpit-podman
    - cockpit-session-recording
    - cockpit-system
    - cockpit-ws-selinux
    - cockpit-image-builder
    - firewalld
    - git
    - ipa-client
    - jq
    - openssh-clients
    - pcp
    - pcp-system-tools
    - python3-pip
    - rsync
    - tar
    - tmux
    - vim-enhanced
    - wget
  firewall_services:
    - cockpit
  cockpit_services:
    - cockpit.socket
    - osbuild-composer.socket
    - pmcd
    - pmlogger
    - pmproxy
  project_parent: /opt/openshift
  project_root: /opt/openshift/aws-metal-openshift-demo
  secrets_root: /opt/openshift/secrets
  collection_root: /usr/share/ansible/collections
  workspace_root: /opt/openshift/aws-metal-openshift-demo
  artifact_root: /opt/openshift/aws-metal-openshift-demo/generated
  cluster_artifact_root: /opt/openshift/aws-metal-openshift-demo/generated/ocp
  tools_root: /opt/openshift/aws-metal-openshift-demo/generated/tools
  controller_pull_secret_file: "{{ lookup('env', 'HOME') }}/pull-secret.txt"
  controller_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
  controller_ssh_public_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
