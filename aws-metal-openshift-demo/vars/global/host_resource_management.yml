---
lab_host_resource_management:
  enabled: true
  host_policy:
    manage_kernel_cmdline: false
    manage_systemd_cpu_affinity: true
    manage_irqbalance_guest_ban: false
  cpu_pools:
    host_reserved: 0-5,24-29,48-53,72-77
    host_housekeeping: 0-1,24-25,48-49,72-73
    host_emulator: 2-5,26-29,50-53,74-77
    guest_domain: 6-23,30-47,54-71,78-95
  kernel_cmdline:
    systemd_cpu_affinity: systemd.cpu_affinity=0-5,24-29,48-53,72-77
    irqaffinity: irqaffinity=0-5,24-29,48-53,72-77
  performance_domains:
    gold:
      partition: /machine/gold
      cpu_shares: 512
      cpu_weight: 512
      default_iothreads: 0
    silver:
      partition: /machine/silver
      cpu_shares: 333
      cpu_weight: 333
      default_iothreads: 0
    bronze:
      partition: /machine/bronze
      cpu_shares: 167
      cpu_weight: 167
      default_iothreads: 0
