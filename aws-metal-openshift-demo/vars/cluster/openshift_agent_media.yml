---
openshift_agent_media:
  output_dir: "{{ lab_execution_ocp_generated_root }}"
  attachment_plan_file: >-
    {{ lab_execution_ocp_generated_root }}/openshift_cluster_attachment_plan.yml
  regenerate_boot_media: false
  publish_to_hypervisor: true
  hypervisor_boot_media_path: /var/lib/libvirt/images/agent.x86_64.iso
  hypervisor_temp_path: /var/tmp/agent.x86_64.iso
  openshift_install_binary: >-
    {{ lab_execution_tools_root }}/{{ mirror_registry_ocp_release
    }}/bin/openshift-install
  create_image_subcommand:
    - agent
    - create
    - image
  boot_artifact:
    filename: agent.x86_64.iso
  update_cluster_attachment_plan: true
