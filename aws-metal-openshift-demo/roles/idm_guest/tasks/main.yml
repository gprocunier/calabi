---
- name: Derive IDM guest facts
  ansible.builtin.set_fact:
    idm_guest_vm_fqdn: "{{ idm_vm.name }}.{{ idm_vm.domain }}"
    idm_guest_admin_email: "hostmaster.{{ idm_vm.domain }}"
    idm_guest_hypervisor_host: >-
      {{ (groups['aws_metal'] | default([])) | first | default('') }}
    idm_guest_cloudinit_iso: >-
      /var/lib/aws-metal-openshift-demo/{{ idm_vm.name }}/{{
      idm_vm.name }}-cidata.iso
    idm_guest_external_ca_enabled: >-
      {{ idm_server.pki.mode | default('idm-root') == 'ad-root-idm-intermediate' }}

- name: Derive IDM guest external CA paths
  ansible.builtin.set_fact:
    idm_guest_external_ca_controller_workdir: >-
      {{ idm_server.pki.controller_work_root | default(lookup('env', 'HOME') + '/.local/state/calabi-pki') }}/{{ idm_guest_vm_fqdn }}
    idm_guest_external_ca_csr_local_path: >-
      {{ (idm_server.pki.controller_work_root | default(lookup('env', 'HOME') + '/.local/state/calabi-pki')) ~ '/' ~ idm_guest_vm_fqdn }}/{{ idm_guest_vm_fqdn }}-ipa.csr
    idm_guest_external_ca_signed_cert_local_path: >-
      {{ (idm_server.pki.controller_work_root | default(lookup('env', 'HOME') + '/.local/state/calabi-pki')) ~ '/' ~ idm_guest_vm_fqdn }}/{{ idm_guest_vm_fqdn }}-ipa.pem
    idm_guest_external_ca_root_cert_local_path: >-
      {{ (idm_server.pki.controller_work_root | default(lookup('env', 'HOME') + '/.local/state/calabi-pki')) ~ '/' ~ idm_guest_vm_fqdn }}/{{ idm_guest_vm_fqdn }}-root-ca.pem

- name: Validate the IDM guest configuration data
  ansible.builtin.assert:
    that:
      - idm_guest_hypervisor_host | length > 0
      - idm_server.realm | length > 0
      - idm_server.ds_password | length > 0
      - idm_server.admin_password | length > 0
      - idm_server.dns_forwarders | length > 0
      - idm_server.trusted_networks | length > 0
      - idm_server.ipa_packages | length > 0
      - idm_server.cockpit.packages | length > 0
      - idm_server.identity_groups | length > 0
      - idm_server.identity_users | length > 0
    fail_msg: >-
      vars/guests/idm_vm.yml is missing required idm_server settings for guest
      configuration.

- name: Check whether the IDM guest already has an RHSM consumer certificate
  ansible.builtin.stat:
    path: /etc/pki/consumer/cert.pem
  register: idm_guest_rhsm_consumer_cert
  when: idm_vm.subscription.enabled | bool

- name: Register the IDM guest with RHSM using activation key
  ansible.builtin.command:
    argv:
      - subscription-manager
      - register
      - --org
      - "{{ idm_vm.subscription.organization_id }}"
      - --activationkey
      - "{{ idm_vm.subscription.activation_key }}"
  register: idm_guest_rhsm_register_activation_key
  changed_when: idm_guest_rhsm_register_activation_key.rc == 0
  failed_when: >-
    idm_guest_rhsm_register_activation_key.rc != 0 and
    'already registered'
    not in (idm_guest_rhsm_register_activation_key.stderr | lower)
  when:
    - idm_vm.subscription.enabled | bool
    - not idm_guest_rhsm_consumer_cert.stat.exists
    - idm_vm.subscription.activation_key | default('') | length > 0
    - idm_vm.subscription.organization_id | default('') | length > 0

- name: Register the IDM guest with RHSM using username and password
  ansible.builtin.command:
    argv:
      - subscription-manager
      - register
      - --username
      - "{{ idm_vm.subscription.username }}"
      - --password
      - "{{ idm_vm.subscription.password }}"
  register: idm_guest_rhsm_register_userpass
  changed_when: idm_guest_rhsm_register_userpass.rc == 0
  failed_when: >-
    idm_guest_rhsm_register_userpass.rc != 0 and
    'already registered'
    not in (idm_guest_rhsm_register_userpass.stderr | lower)
  when:
    - idm_vm.subscription.enabled | bool
    - not idm_guest_rhsm_consumer_cert.stat.exists
    - not (
        idm_vm.subscription.activation_key | default('') | length > 0
        and
        idm_vm.subscription.organization_id | default('') | length > 0
      )
    - idm_vm.subscription.username | default('') | length > 0
    - idm_vm.subscription.password | default('') | length > 0

- name: Enable subscription-manager CDN repo management on the IDM guest
  ansible.builtin.command:
    argv:
      - subscription-manager
      - config
      - --rhsm.manage_repos=1
  register: idm_guest_manage_repos
  changed_when: "'manage_repos = 1' in idm_guest_manage_repos.stdout"
  when: idm_vm.subscription.enabled | bool

- name: Ensure insights-client is installed on the IDM guest
  ansible.builtin.package:
    name: insights-client
    state: present
  when: idm_vm.subscription.enabled | bool

- name: Check current Insights registration status on the IDM guest
  ansible.builtin.stat:
    path: /etc/insights-client/.registered
  register: idm_guest_insights_registered
  when: idm_vm.subscription.enabled | bool

- name: Register the IDM guest with Red Hat Insights
  ansible.builtin.command:
    argv:
      - insights-client
      - --register
  when:
    - idm_vm.subscription.enabled | bool
    - not idm_guest_insights_registered.stat.exists
  changed_when: true

- name: Update all packages on the IDM guest
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true
  register: idm_guest_package_update

- name: Power-cycle the IDM domain after guest updates so persistent XML changes take effect # noqa no-handler
  when: idm_guest_package_update.changed
  block:
    - name: Request an IDM guest poweroff after updates
      ansible.builtin.shell: |
        nohup bash -c 'sleep 5; systemctl poweroff' >/dev/null 2>&1 &
      args:
        executable: /bin/bash
      async: 30
      poll: 0
      changed_when: true

    - name: Wait for the IDM libvirt domain to power off
      ansible.builtin.command:
        argv:
          - virsh
          - domstate
          - "{{ idm_guest_vm_fqdn }}"
      register: idm_guest_domain_state_after_update
      until: "'shut off' in (idm_guest_domain_state_after_update.stdout | lower)"
      retries: 90
      delay: 10
      changed_when: false
      delegate_to: "{{ idm_guest_hypervisor_host }}"

    - name: Identify matching IDM cloud-init CD-ROM targets in persistent XML
      ansible.builtin.shell: |
        set -euo pipefail
        virsh domblklist "{{ idm_guest_vm_fqdn }}" --details \
          | awk -v media="{{ idm_guest_cloudinit_iso }}" \
              '$2 == "cdrom" && ($4 == media || $4 == "-") {print $3}'
      args:
        executable: /bin/bash
      register: idm_guest_cdrom_targets
      changed_when: false
      delegate_to: "{{ idm_guest_hypervisor_host }}"

    - name: Remove IDM cloud-init CD-ROM devices from persistent XML
      ansible.builtin.command:
        argv:
          - virt-xml
          - "{{ idm_guest_vm_fqdn }}"
          - --remove-device
          - --disk
          - "target={{ item }}"
      loop: "{{ idm_guest_cdrom_targets.stdout_lines }}"
      changed_when: true
      delegate_to: "{{ idm_guest_hypervisor_host }}"

    - name: Reset IDM guest boot order to disk only
      ansible.builtin.command:
        argv:
          - virt-xml
          - "{{ idm_guest_vm_fqdn }}"
          - --edit
          - --boot
          - hd
      changed_when: true
      delegate_to: "{{ idm_guest_hypervisor_host }}"

    - name: Remove the IDM cloud-init ISO from the hypervisor
      ansible.builtin.file:
        path: "{{ idm_guest_cloudinit_iso }}"
        state: absent
      delegate_to: "{{ idm_guest_hypervisor_host }}"

    - name: Start the IDM libvirt domain after offline media cleanup
      ansible.builtin.command:
        argv:
          - virsh
          - start
          - "{{ idm_guest_vm_fqdn }}"
      changed_when: true
      delegate_to: "{{ idm_guest_hypervisor_host }}"
- name: Wait for the IDM guest after the optional domain restart # noqa no-handler
  ansible.builtin.wait_for_connection:
    timeout: 1800
    sleep: 10
  when: idm_guest_package_update.changed

- name: Refresh facts after the optional update power-cycle
  ansible.builtin.setup:

- name: Install calabi-shell after RHSM registration and guest updates
  ansible.builtin.include_role:
    name: calabi_shell

- name: Ensure guest configuration packages are installed
  ansible.builtin.package:
    name: >-
      {{
        ['firewalld', 'oddjob', 'oddjob-mkhomedir'] +
        idm_server.ipa_packages +
        idm_server.cockpit.packages +
        idm_server.session_recording.packages
      }}
    state: present

- name: Ensure the journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure journald persists session recordings across reboots
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/10-persistent-storage.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Journal]
      Storage=persistent
  notify: Restart journald

- name: Ensure the persistent journal directory exists
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    owner: root
    group: systemd-journal
    mode: "2755"

- name: Ensure cockpit socket is enabled
  ansible.builtin.systemd_service:
    name: cockpit.socket
    state: started
    enabled: true

- name: Ensure firewalld is enabled on the IDM guest
  ansible.builtin.systemd_service:
    name: firewalld
    state: started
    enabled: true

- name: Ensure oddjobd is enabled on the IDM guest
  ansible.builtin.systemd_service:
    name: oddjobd.service
    state: started
    enabled: true

- name: Check which guest firewall services are already enabled
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --query-service={{ item }}
  register: idm_guest_firewall_service_queries
  changed_when: false
  failed_when: false
  loop: "{{ idm_server.firewall_services }}"

- name: Open guest firewall services for IDM and Cockpit
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --add-service={{ item.item }}
  loop: "{{ idm_guest_firewall_service_queries.results }}"
  when: item.rc != 0
  register: idm_guest_firewall_service_changes
  changed_when: true

- name: Reload the guest firewall when services changed
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --reload
  when: >-
    idm_guest_firewall_service_changes is defined and
    (
      idm_guest_firewall_service_changes.results
      | selectattr('changed')
      | list
      | length > 0
    )
  changed_when: true

- name: Ensure the controller-side PKI working directory exists
  ansible.builtin.file:
    path: "{{ idm_guest_external_ca_controller_workdir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: idm_guest_external_ca_enabled | bool

- name: Install and configure the IdM server with integrated KRA
  ansible.builtin.include_role:
    name: freeipa.ansible_freeipa.ipaserver
  vars:
    state: present
    ipaserver_install_packages: false
    ipaserver_setup_firewalld: false
    ipaserver_no_host_dns: true
    ipaserver_hostname: "{{ idm_guest_vm_fqdn }}"
    ipaserver_ip_addresses:
      - "{{ idm_vm.network.ipv4_address }}"
    ipaserver_domain: "{{ idm_vm.domain }}"
    ipaserver_realm: "{{ idm_server.realm }}"
    ipadm_password: "{{ idm_server.ds_password }}"
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaserver_setup_dns: "{{ idm_server.setup_dns | bool }}"
    ipaserver_forwarders: "{{ idm_server.dns_forwarders }}"
    ipaserver_no_forwarders: "{{ (idm_server.dns_forwarders | length) == 0 }}"
    ipaserver_setup_kra: true
  when: not (idm_guest_external_ca_enabled | bool)

- name: Generate the FreeIPA external-CA signing request
  ansible.builtin.include_role:
    name: freeipa.ansible_freeipa.ipaserver
  vars:
    state: present
    ipaserver_install_packages: false
    ipaserver_setup_firewalld: false
    ipaserver_no_host_dns: true
    ipaserver_hostname: "{{ idm_guest_vm_fqdn }}"
    ipaserver_ip_addresses:
      - "{{ idm_vm.network.ipv4_address }}"
    ipaserver_domain: "{{ idm_vm.domain }}"
    ipaserver_realm: "{{ idm_server.realm }}"
    ipadm_password: "{{ idm_server.ds_password }}"
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaserver_setup_dns: "{{ idm_server.setup_dns | bool }}"
    ipaserver_forwarders: "{{ idm_server.dns_forwarders }}"
    ipaserver_no_forwarders: "{{ (idm_server.dns_forwarders | length) == 0 }}"
    ipaserver_setup_kra: true
    ipaserver_external_ca: true
    ipaserver_external_ca_type: "{{ idm_server.pki.external_ca_type | default('ms-cs') }}"
    ipaserver_external_ca_profile: "{{ idm_server.pki.external_ca_profile | default('SubCA') }}"
  when: idm_guest_external_ca_enabled | bool

- name: Fetch the generated FreeIPA external-CA CSR to the controller
  ansible.builtin.fetch:
    src: /root/ipa.csr
    dest: "{{ idm_guest_external_ca_csr_local_path }}"
    flat: true
  when: idm_guest_external_ca_enabled | bool

- name: Copy the FreeIPA external-CA CSR to the AD CS host
  ansible.windows.win_copy:
    src: "{{ idm_guest_external_ca_csr_local_path }}"
    dest: C:\Windows\Temp\calabi-idm-ipa.csr
  delegate_to: adcs_ca
  when: idm_guest_external_ca_enabled | bool

- name: Sign the FreeIPA CA request and export the AD CS root certificate
  ansible.windows.win_shell: |
    $signedDer = 'C:\Windows\Temp\calabi-idm-ipa.cer'
    $signedPem = 'C:\Windows\Temp\calabi-idm-ipa.pem'
    $rootDer = 'C:\Windows\Temp\calabi-root-ca.cer'
    $rootPem = 'C:\Windows\Temp\calabi-root-ca.pem'
    certreq -submit -q -f `
      -config ".\{{ ad_server.ca_common_name }}" `
      -attrib "CertificateTemplate:{{ idm_server.pki.external_ca_profile | default('SubCA') }}" `
      C:\Windows\Temp\calabi-idm-ipa.csr `
      $signedDer
    if ($LASTEXITCODE -ne 0 -or -not (Test-Path $signedDer)) {
      Write-Error "AD CS did not return a signed subordinate CA certificate"
      exit 1
    }
    certutil -f -encode $signedDer $signedPem | Out-Null
    certutil -ca.cert $rootDer | Out-Null
    certutil -f -encode $rootDer $rootPem | Out-Null
  delegate_to: adcs_ca
  when: idm_guest_external_ca_enabled | bool

- name: Read the signed FreeIPA CA certificate from the AD CS host
  ansible.windows.win_shell: |
    Get-Content -Raw C:\Windows\Temp\calabi-idm-ipa.pem
  register: idm_guest_external_ca_signed_cert
  delegate_to: adcs_ca
  changed_when: false
  when: idm_guest_external_ca_enabled | bool

- name: Read the AD CS root CA certificate from the AD CS host
  ansible.windows.win_shell: |
    Get-Content -Raw C:\Windows\Temp\calabi-root-ca.pem
  register: idm_guest_external_ca_root_cert
  delegate_to: adcs_ca
  changed_when: false
  when: idm_guest_external_ca_enabled | bool

- name: Persist the signed FreeIPA CA certificate on the controller
  ansible.builtin.copy:
    dest: "{{ idm_guest_external_ca_signed_cert_local_path }}"
    content: "{{ idm_guest_external_ca_signed_cert.stdout }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: idm_guest_external_ca_enabled | bool

- name: Persist the AD CS root CA certificate on the controller
  ansible.builtin.copy:
    dest: "{{ idm_guest_external_ca_root_cert_local_path }}"
    content: "{{ idm_guest_external_ca_root_cert.stdout }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: idm_guest_external_ca_enabled | bool

- name: Complete the FreeIPA installation with the signed external CA chain
  ansible.builtin.include_role:
    name: freeipa.ansible_freeipa.ipaserver
  vars:
    state: present
    ipaserver_install_packages: false
    ipaserver_setup_firewalld: false
    ipaserver_no_host_dns: true
    ipaserver_hostname: "{{ idm_guest_vm_fqdn }}"
    ipaserver_ip_addresses:
      - "{{ idm_vm.network.ipv4_address }}"
    ipaserver_domain: "{{ idm_vm.domain }}"
    ipaserver_realm: "{{ idm_server.realm }}"
    ipadm_password: "{{ idm_server.ds_password }}"
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaserver_setup_dns: "{{ idm_server.setup_dns | bool }}"
    ipaserver_forwarders: "{{ idm_server.dns_forwarders }}"
    ipaserver_no_forwarders: "{{ (idm_server.dns_forwarders | length) == 0 }}"
    ipaserver_setup_kra: true
    ipaserver_external_cert_files_from_controller:
      - "{{ idm_guest_external_ca_signed_cert_local_path }}"
      - "{{ idm_guest_external_ca_root_cert_local_path }}"
  when: idm_guest_external_ca_enabled | bool

- name: Check whether Kerberos admin credentials are already cached
  ansible.builtin.command:
    argv:
      - klist
  register: idm_guest_klist
  changed_when: false
  failed_when: false

- name: Acquire an admin Kerberos ticket for IPA CLI operations
  ansible.builtin.command:
    argv:
      - kinit
      - admin
    stdin: "{{ idm_server.admin_password }}\n"
  when: idm_guest_klist.rc != 0
  changed_when: true

- name: Configure IPA global DNS forwarders
  ansible.builtin.command:
    argv: >-
      {{
        ['ipa', 'dnsconfig-mod'] +
        (
          idm_server.dns_forwarders
          | map('regex_replace', '^', '--forwarder=')
          | list
        )
      }}
  register: idm_guest_dnsconfig_mod
  changed_when: >-
    'no modifications to be performed'
    not in idm_guest_dnsconfig_mod.stderr
  failed_when: >-
    idm_guest_dnsconfig_mod.rc != 0 and
    'no modifications to be performed'
    not in idm_guest_dnsconfig_mod.stderr

- name: Build the list of reverse DNS zones required for static infrastructure records
  ansible.builtin.set_fact:
    idm_guest_static_reverse_zones: >-
      {{
        idm_server.static_dns_records
        | default([])
        | selectattr('record_type', 'equalto', 'PTR')
        | map(attribute='zone_name')
        | unique
        | list
      }}

- name: Ensure reverse DNS zones exist for static infrastructure records
  freeipa.ansible_freeipa.ipadnszone:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name: "{{ item }}"
    name_server: "{{ idm_guest_vm_fqdn }}."
    admin_email: "{{ idm_guest_admin_email }}"
    dynamic_update: false
    state: present
  loop: "{{ idm_guest_static_reverse_zones }}"
  when: idm_guest_static_reverse_zones | length > 0

- name: Ensure static infrastructure DNS records exist
  freeipa.ansible_freeipa.ipadnsrecord:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    zone_name: "{{ item.zone_name }}"
    name: "{{ item.name }}"
    record_type: "{{ item.record_type }}"
    record_value: "{{ item.record_value }}"
    state: present
  loop: "{{ idm_server.static_dns_records | default([]) }}"
  loop_control:
    label: "{{ item.label | default(item.name) }}"

- name: Build authoritative DNS validation targets for static infrastructure A records
  ansible.builtin.set_fact:
    idm_guest_static_dns_authoritative_targets: >-
      {%- set targets = [] -%}
      {%- for record in idm_server.static_dns_records | default([]) -%}
      {%- if record.record_type == 'A' -%}
      {%- set _ = targets.append({
            'fqdn': record.name ~ '.' ~ record.zone_name ~ '.',
            'expected_ipv4': record.record_value,
            'label': record.label | default(record.name ~ '.' ~ record.zone_name)
          }) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ targets }}

- name: Query authoritative IdM DNS for static infrastructure A records
  ansible.builtin.command:
    argv:
      - dig
      - +short
      - "@{{ idm_vm.network.ipv4_address }}"
      - "{{ item.fqdn }}"
      - A
  loop: "{{ idm_guest_static_dns_authoritative_targets }}"
  loop_control:
    label: "{{ item.label }}"
  register: idm_guest_static_dns_authoritative_responses
  changed_when: false
  retries: 12
  delay: 5
  until: >-
    (
      idm_guest_static_dns_authoritative_responses.stdout_lines
      | default([])
      | map('trim')
      | reject('equalto', '')
      | list
    ) == [item.expected_ipv4]

- name: Assert authoritative IdM DNS matches static infrastructure A records
  ansible.builtin.assert:
    that:
      - >-
        (
          item.stdout_lines
          | map('trim')
          | reject('equalto', '')
          | list
        ) == [item.item.expected_ipv4]
    fail_msg: >-
      Authoritative IdM DNS did not resolve {{ item.item.fqdn }}
      to {{ item.item.expected_ipv4 }}.
  loop: "{{ idm_guest_static_dns_authoritative_responses.results }}"
  loop_control:
    label: "{{ item.item.label }}"

- name: Ensure the requested IPA groups exist
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name:
      - "{{ item }}"
    description: "{{ idm_server.identity_group_descriptions[item] | default(omit) }}"
    state: present
  loop: "{{ idm_server.identity_groups }}"

- name: Ensure the configured IPA group password policies exist
  freeipa.ansible_freeipa.ipapwpolicy:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name:
      - "{{ item.0 }}"
    maxlife: "{{ idm_server.password_policy.maxlife_days }}"
    minlife: "{{ idm_server.password_policy.minlife_hours }}"
    history: "{{ idm_server.password_policy.history_length }}"
    minclasses: "{{ idm_server.password_policy.minclasses }}"
    minlength: "{{ idm_server.password_policy.minlength }}"
    priority: "{{ item.1 }}"
    state: present
  loop: >-
    {{
      idm_server.identity_groups
      | zip(
          range(
            idm_server.password_policy.priority_start,
            idm_server.password_policy.priority_start
            + (idm_server.identity_groups | length * idm_server.password_policy.priority_step),
            idm_server.password_policy.priority_step
          )
        )
      | list
    }}
  when: idm_server.password_policy.enabled | default(false)

- name: Ensure the requested IPA users exist with the lab-safe expiration
  freeipa.ansible_freeipa.ipauser:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    users:
      - name: "{{ item.name }}"
        first: "{{ item.first_name }}"
        last: "{{ item.last_name }}"
        password: "{{ item.password }}"
        shell: "{{ item.shell | default('/bin/bash') }}"
        passwordexpiration: "20360313235039"
        email:
          - "{{ item.name }}@{{ idm_vm.domain }}"
    state: present
  loop: "{{ idm_server.identity_users }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Ensure IPA group memberships match the configured users
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name:
      - "{{ item }}"
    action: member
    user: >-
      {{
        idm_server.identity_users
        | selectattr('groups', 'contains', item)
        | map(attribute='name')
        | list
      }}
    state: present
  loop: "{{ idm_server.identity_groups }}"

- name: Ensure the configured IPA sudo rule exists with full admin access
  freeipa.ansible_freeipa.ipasudorule:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name:
      - "{{ idm_server.sudo_policy.rule_name }}"
    description: "{{ idm_server.sudo_policy.description }}"
    group:
      - "{{ idm_server.sudo_policy.group }}"
    hostcategory: all
    cmdcategory: all
    runasusercategory: all
    runasgroupcategory: all
    sudooption:
      - "!authenticate"
    state: present
  when: idm_server.sudo_policy.enabled | default(false)

- name: Ensure the ipa service is enabled and running
  ansible.builtin.systemd_service:
    name: ipa
    state: started
    enabled: true

- name: Configure the trusted DNS ACL definition
  ansible.builtin.template:
    src: ipa-ext.conf.j2
    dest: /etc/named/ipa-ext.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart named

- name: Enable trusted-network recursion and cache access
  ansible.builtin.template:
    src: ipa-options-ext.conf.j2
    dest: /etc/named/ipa-options-ext.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart named

- name: Validate the named configuration after trusted ACL changes
  ansible.builtin.command:
    argv:
      - named-checkconf
      - /etc/named.conf
  changed_when: false

- name: Deploy the SSSD session recording policy
  ansible.builtin.template:
    src: sssd-session-recording.conf.j2
    dest: /etc/sssd/conf.d/sssd-session-recording.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart sssd

- name: Check the current authselect profile
  ansible.builtin.command:
    argv:
      - authselect
      - current
      - --raw
  register: idm_guest_authselect_current
  changed_when: false

- name: Enable the authselect tlog feature
  ansible.builtin.command:
    argv:
      - authselect
      - select
      - sssd
      - with-tlog
      - with-mkhomedir
      - with-sudo
      - --force
  when: >-
    'with-tlog' not in idm_guest_authselect_current.stdout or
    'with-mkhomedir' not in idm_guest_authselect_current.stdout or
    'with-sudo' not in idm_guest_authselect_current.stdout
  changed_when: true
  notify: Restart sssd

- name: Flush guest configuration handlers
  ansible.builtin.meta: flush_handlers
