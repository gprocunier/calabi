---
- name: Derive bastion guest facts
  ansible.builtin.set_fact:
    bastion_guest_vm_fqdn: "{{ bastion_vm.name }}.{{ bastion_vm.domain }}"
    bastion_guest_hypervisor_host: >-
      {{ (groups['aws_metal'] | default([])) | first | default('') }}
    bastion_guest_cloudinit_iso: >-
      /var/lib/aws-metal-openshift-demo/{{ bastion_vm.name }}/{{
      bastion_vm.name }}-cidata.iso
    bastion_guest_ipa_server: "{{ idm_vm.name }}.{{ idm_vm.domain }}"
    bastion_guest_ipa_admin_password: "{{ idm_server.admin_password }}"
    bastion_guest_ipa_admin_principal: >-
      {{
        bastion_client.admin_principal
        if '@' in bastion_client.admin_principal
        else bastion_client.admin_principal ~ '@' ~ idm_server.realm
      }}
    bastion_guest_idm_ca_path: /etc/ipa/ca.crt
    bastion_guest_ipv4_address: >-
      {{ bastion_vm.network.ipv4_address | regex_replace('/.*$', '') }}
    bastion_guest_reverse_zone: >-
      {{
        (bastion_vm.network.ipv4_address | regex_replace('/.*$', '')).split('.')[2]
        ~ '.'
        ~ (bastion_vm.network.ipv4_address | regex_replace('/.*$', '')).split('.')[1]
        ~ '.'
        ~ (bastion_vm.network.ipv4_address | regex_replace('/.*$', '')).split('.')[0]
        ~ '.in-addr.arpa'
      }}

- name: Derive whether IdM enrollment work is enabled for the bastion guest
  ansible.builtin.set_fact:
    bastion_guest_join_idm_enabled: "{{ bastion_guest_join_idm | default(false) | bool }}"

- name: Derive whether bastion guest package updates are enabled
  ansible.builtin.set_fact:
    bastion_guest_manage_package_updates: >-
      {{ bastion_guest_manage_updates | default(false) | bool }}

- name: Validate bastion guest hypervisor inventory is present
  ansible.builtin.assert:
    that:
      - bastion_guest_hypervisor_host | length > 0
    fail_msg: >-
      bastion guest configuration requires an aws_metal hypervisor inventory
      host.

- name: Determine the active NetworkManager connection on the bastion guest
  ansible.builtin.command:
    argv:
      - nmcli
      - -t
      - -f
      - NAME,DEVICE
      - connection
      - show
      - --active
  register: bastion_guest_active_connections
  changed_when: false

- name: Store the active bastion uplink connection name
  ansible.builtin.set_fact:
    bastion_guest_uplink_connection_name: >-
      {{
        (
          bastion_guest_active_connections.stdout_lines
          | select(
              'search',
              ':' ~ bastion_vm.network.interface_name ~ '$'
            )
          | map('split', ':')
          | map('first')
          | list
          | first
        ) | default('')
      }}

- name: Check whether authoritative IdM DNS is reachable from the bastion guest
  ansible.builtin.wait_for:
    host: "{{ idm_vm.network.ipv4_address }}"
    port: 53
    timeout: 3
    connect_timeout: 1
    sleep: 1
  register: bastion_guest_idm_dns_reachable
  changed_when: false
  ignore_errors: true
  when: bastion_guest_uplink_connection_name | length > 0

- name: Derive the bastion guest DNS servers for the current bootstrap stage
  ansible.builtin.set_fact:
    bastion_guest_bootstrap_dns_servers: >-
      {{
        (
          [idm_vm.network.ipv4_address]
          + (
            bastion_vm.network.dns_servers
            | reject('equalto', idm_vm.network.ipv4_address)
            | list
          )
        )
        if (bastion_guest_idm_dns_reachable is succeeded)
        else (
          bastion_vm.network.dns_servers
          | reject('equalto', idm_vm.network.ipv4_address)
          | list
        )
      }}
  when: bastion_guest_uplink_connection_name | length > 0

- name: Configure the bastion guest DNS servers for the current bootstrap stage
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - modify
      - "{{ bastion_guest_uplink_connection_name }}"
      - ipv4.dns
      - "{{ bastion_guest_bootstrap_dns_servers | join(' ') }}"
      - ipv4.ignore-auto-dns
      - "yes"
  changed_when: true
  when:
    - bastion_guest_uplink_connection_name | length > 0
    - (bastion_guest_bootstrap_dns_servers | default([])) | length > 0

- name: Reapply the bastion guest interface after bootstrap DNS changes
  ansible.builtin.command:
    argv:
      - nmcli
      - device
      - reapply
      - "{{ bastion_vm.network.interface_name }}"
  changed_when: true
  when:
    - bastion_guest_uplink_connection_name | length > 0
    - (bastion_guest_bootstrap_dns_servers | default([])) | length > 0

- name: Check whether the bastion guest already has an RHSM consumer certificate
  ansible.builtin.stat:
    path: /etc/pki/consumer/cert.pem
  register: bastion_guest_rhsm_consumer_cert
  when: bastion_vm.subscription.enabled | bool

- name: Register the bastion guest with RHSM using activation key
  ansible.builtin.command:
    argv:
      - subscription-manager
      - register
      - --org
      - "{{ bastion_vm.subscription.organization_id }}"
      - --activationkey
      - "{{ bastion_vm.subscription.activation_key }}"
  register: bastion_guest_rhsm_register_activation_key
  changed_when: bastion_guest_rhsm_register_activation_key.rc == 0
  failed_when: >-
    bastion_guest_rhsm_register_activation_key.rc != 0 and
    'already registered'
    not in (bastion_guest_rhsm_register_activation_key.stderr | lower)
  when:
    - bastion_vm.subscription.enabled | bool
    - not bastion_guest_rhsm_consumer_cert.stat.exists
    - bastion_vm.subscription.activation_key | default('') | length > 0
    - bastion_vm.subscription.organization_id | default('') | length > 0

- name: Register the bastion guest with RHSM using username and password
  ansible.builtin.command:
    argv:
      - subscription-manager
      - register
      - --username
      - "{{ bastion_vm.subscription.username }}"
      - --password
      - "{{ bastion_vm.subscription.password }}"
  register: bastion_guest_rhsm_register_userpass
  changed_when: bastion_guest_rhsm_register_userpass.rc == 0
  failed_when: >-
    bastion_guest_rhsm_register_userpass.rc != 0 and
    'already registered'
    not in (bastion_guest_rhsm_register_userpass.stderr | lower)
  when:
    - bastion_vm.subscription.enabled | bool
    - not bastion_guest_rhsm_consumer_cert.stat.exists
    - not (
        bastion_vm.subscription.activation_key | default('') | length > 0
        and
        bastion_vm.subscription.organization_id | default('') | length > 0
      )
    - bastion_vm.subscription.username | default('') | length > 0
    - bastion_vm.subscription.password | default('') | length > 0

- name: Enable subscription-manager CDN repo management on the bastion guest
  ansible.builtin.command:
    argv:
      - subscription-manager
      - config
      - --rhsm.manage_repos=1
  register: bastion_guest_manage_repos
  changed_when: "'manage_repos = 1' in bastion_guest_manage_repos.stdout"
  when: bastion_vm.subscription.enabled | bool

- name: Ensure insights-client is installed on the bastion guest
  ansible.builtin.package:
    name: insights-client
    state: present
  when: bastion_vm.subscription.enabled | bool

- name: Check current Insights registration status on the bastion guest
  ansible.builtin.stat:
    path: /etc/insights-client/.registered
  register: bastion_guest_insights_registered
  when: bastion_vm.subscription.enabled | bool

- name: Register the bastion guest with Red Hat Insights
  ansible.builtin.command:
    argv:
      - insights-client
      - --register
  when:
    - bastion_vm.subscription.enabled | bool
    - not bastion_guest_insights_registered.stat.exists
  changed_when: true

- name: Update the bastion guest packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  register: bastion_guest_package_update
  when: bastion_guest_manage_package_updates | bool
  # noqa: package-latest

- name: Power-cycle the bastion domain after guest updates so persistent XML changes take effect
  when: bastion_guest_package_update.changed
  # noqa: no-handler
  block:
    - name: Request a bastion guest poweroff after updates
      ansible.builtin.shell: |
        nohup bash -c 'sleep 5; systemctl poweroff' >/dev/null 2>&1 &
      args:
        executable: /bin/bash
      async: 30
      poll: 0
      changed_when: true

    - name: Wait for the bastion libvirt domain to power off
      ansible.builtin.command:
        argv:
          - virsh
          - domstate
          - "{{ bastion_guest_vm_fqdn }}"
      register: bastion_guest_domain_state_after_update
      until: "'shut off' in (bastion_guest_domain_state_after_update.stdout | lower)"
      retries: 90
      delay: 10
      changed_when: false
      delegate_to: "{{ bastion_guest_hypervisor_host }}"

    - name: Identify matching bastion cloud-init CD-ROM targets in persistent XML
      ansible.builtin.shell: |
        set -euo pipefail
        virsh domblklist "{{ bastion_guest_vm_fqdn }}" --details \
          | awk -v media="{{ bastion_guest_cloudinit_iso }}" \
              '$2 == "cdrom" && ($4 == media || $4 == "-") {print $3}'
      args:
        executable: /bin/bash
      register: bastion_guest_cdrom_targets
      changed_when: false
      delegate_to: "{{ bastion_guest_hypervisor_host }}"

    - name: Remove bastion cloud-init CD-ROM devices from persistent XML
      ansible.builtin.command:
        argv:
          - virt-xml
          - "{{ bastion_guest_vm_fqdn }}"
          - --remove-device
          - --disk
          - "target={{ item }}"
      loop: "{{ bastion_guest_cdrom_targets.stdout_lines }}"
      changed_when: true
      delegate_to: "{{ bastion_guest_hypervisor_host }}"

    - name: Reset bastion guest boot order to disk only
      ansible.builtin.command:
        argv:
          - virt-xml
          - "{{ bastion_guest_vm_fqdn }}"
          - --edit
          - --boot
          - hd
      changed_when: true
      delegate_to: "{{ bastion_guest_hypervisor_host }}"

    - name: Remove the bastion cloud-init ISO from the hypervisor
      ansible.builtin.file:
        path: "{{ bastion_guest_cloudinit_iso }}"
        state: absent
      delegate_to: "{{ bastion_guest_hypervisor_host }}"

    - name: Start the bastion libvirt domain after offline media cleanup
      ansible.builtin.command:
        argv:
          - virsh
          - start
          - "{{ bastion_guest_vm_fqdn }}"
      changed_when: true
      delegate_to: "{{ bastion_guest_hypervisor_host }}"

- name: Wait for the bastion guest after the optional domain restart
  ansible.builtin.wait_for_connection:
    timeout: 1800
    sleep: 10
  when: bastion_guest_package_update.changed
  # noqa: no-handler

- name: Refresh facts after the optional bastion power-cycle
  ansible.builtin.setup:

- name: Install calabi-shell after RHSM registration and guest updates
  ansible.builtin.include_role:
    name: calabi_shell

- name: Install the bastion guest package set
  ansible.builtin.package:
    name: "{{ bastion_client.packages + ['oddjob', 'oddjob-mkhomedir'] }}"
    state: present

- name: Ensure firewalld is enabled on the bastion guest
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true

- name: Check bastion firewall services
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --query-service={{ item }}
  loop: "{{ bastion_client.firewall_services }}"
  register: bastion_guest_firewall_service_queries
  changed_when: false
  failed_when: false

- name: Open bastion firewall services
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --add-service={{ item.item }}
  loop: "{{ bastion_guest_firewall_service_queries.results }}"
  when: item.rc != 0
  changed_when: true
  notify: Reload bastion firewalld

- name: Ensure Cockpit and PCP services are enabled on the bastion guest
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ bastion_client.cockpit_services }}"

- name: Ensure oddjobd is enabled on the bastion guest
  ansible.builtin.service:
    name: oddjobd.service
    state: started
    enabled: true

- name: Ensure bastion workspace directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ bastion_client.workspace_root }}"
    - "{{ bastion_client.artifact_root }}"
    - "{{ bastion_client.cluster_artifact_root }}"
    - "{{ bastion_client.tools_root }}"

- name: Enroll the bastion guest into IdM when requested
  when: bastion_guest_join_idm_enabled | bool
  block:
    - name: Determine the active NetworkManager connection on the bastion guest
      ansible.builtin.command:
        argv:
          - nmcli
          - -t
          - -f
          - NAME,DEVICE
          - connection
          - show
          - --active
      register: bastion_guest_active_connections
      changed_when: false

    - name: Store the active bastion uplink connection name
      ansible.builtin.set_fact:
        bastion_guest_uplink_connection_name: >-
          {{
            (
              bastion_guest_active_connections.stdout_lines
              | select(
                  'search',
                  ':' ~ bastion_vm.network.interface_name ~ '$'
                )
              | map('split', ':')
              | map('first')
              | list
              | first
            ) | default('')
          }}

    - name: Wait for authoritative IdM DNS from the bastion guest network
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 53
        timeout: 120
        connect_timeout: 1
        sleep: 2
      changed_when: false
      when: bastion_guest_uplink_connection_name | length > 0

    - name: Configure the bastion guest to use IdM DNS first
      ansible.builtin.command:
        argv:
          - nmcli
          - connection
          - modify
          - "{{ bastion_guest_uplink_connection_name }}"
          - ipv4.dns
          - >-
            {{
              ([idm_vm.network.ipv4_address]
              + (
                bastion_vm.network.dns_servers
                | reject('equalto', idm_vm.network.ipv4_address)
                | list
              )) | join(' ')
            }}
          - ipv4.ignore-auto-dns
          - "yes"
      changed_when: true
      when: bastion_guest_uplink_connection_name | length > 0

    - name: Reapply the bastion guest interface after IdM DNS changes
      ansible.builtin.command:
        argv:
          - nmcli
          - device
          - reapply
          - "{{ bastion_vm.network.interface_name }}"
      changed_when: true
      when: bastion_guest_uplink_connection_name | length > 0

    - name: Check whether the bastion guest is already enrolled in IdM
      ansible.builtin.stat:
        path: /etc/ipa/default.conf
      register: bastion_guest_ipa_default_conf

    - name: Refresh the local IdM CA file from the active IdM server before bastion enrollment checks
      ansible.builtin.get_url:
        url: "http://{{ bastion_guest_ipa_server }}/ipa/config/ca.crt"
        dest: "{{ bastion_guest_idm_ca_path }}"
        mode: "0644"

    - name: Trust the active IdM CA before bastion enrollment checks
      ansible.builtin.copy:
        src: "{{ bastion_guest_idm_ca_path }}"
        dest: /etc/pki/ca-trust/source/anchors/idm-rootCA.pem
        remote_src: true
        owner: root
        group: root
        mode: "0644"

    - name: Refresh the guest CA trust before bastion enrollment checks
      ansible.builtin.command:
        argv:
          - update-ca-trust
          - extract
      changed_when: false

    - name: Acquire an IPA admin ticket before validating bastion host state
      ansible.builtin.command:
        argv:
          - kinit
          - "{{ bastion_guest_ipa_admin_principal }}"
        stdin: "{{ bastion_guest_ipa_admin_password }}\n"
      changed_when: true

    - name: Check whether the bastion host object already exists in IdM
      ansible.builtin.command:
        argv:
          - ipa
          - host-show
          - "{{ bastion_guest_vm_fqdn }}"
      register: bastion_guest_ipa_host_show
      changed_when: false
      failed_when: false

    - name: Determine whether the bastion guest must rejoin IdM
      ansible.builtin.set_fact:
        bastion_guest_ipa_rejoin_required: >-
          {{
            (not bastion_guest_ipa_default_conf.stat.exists)
            or bastion_guest_ipa_host_show.rc != 0
          }}

    - name: Uninstall the stale bastion IPA client before rejoining
      ansible.builtin.command:
        argv:
          - ipa-client-install
          - --uninstall
          - -U
      when:
        - bastion_guest_ipa_rejoin_required
        - bastion_guest_ipa_default_conf.stat.exists
      changed_when: true

    - name: Join the bastion guest to IdM with the FreeIPA client role
      ansible.builtin.include_role:
        name: freeipa.ansible_freeipa.ipaclient
      vars:
        state: present
        ipaclient_install_packages: false
        ipaclient_force_join: true
        ipaclient_domain: "{{ idm_vm.domain }}"
        ipaclient_realm: "{{ idm_server.realm }}"
        ipaclient_servers:
          - "{{ idm_vm.name }}.{{ idm_vm.domain }}"
        ipaclient_hostname: "{{ bastion_vm.name }}.{{ bastion_vm.domain }}"
        ipaclient_no_dns_lookup: true
        ipasssd_enable_dns_updates: false
        ipaadmin_principal: "{{ bastion_client.admin_principal }}"
        ipaadmin_password: "{{ idm_server.admin_password }}"
      no_log: true
      when: bastion_guest_ipa_rejoin_required

    - name: Wait for bastion SSH to settle after IdM enrollment
      ansible.builtin.wait_for_connection:
        timeout: 300
      when: bastion_guest_ipa_rejoin_required
      # noqa: no-handler

    - name: Reacquire an IPA admin ticket after the optional bastion rejoin
      ansible.builtin.command:
        argv:
          - kinit
          - "{{ bastion_guest_ipa_admin_principal }}"
        stdin: "{{ bastion_guest_ipa_admin_password }}\n"
      when: bastion_guest_ipa_rejoin_required
      changed_when: true

    - name: Confirm bastion IdM enrollment completed
      ansible.builtin.command:
        argv:
          - ipa
          - host-show
          - "{{ bastion_guest_vm_fqdn }}"
      register: bastion_guest_ipa_host_show_after_join
      changed_when: false
      until: bastion_guest_ipa_host_show_after_join.rc == 0
      retries: 20
      delay: 15
      when: bastion_guest_ipa_rejoin_required

    - name: Reassert the bastion A record in authoritative IdM DNS
      ansible.builtin.shell: |
        set -euo pipefail
        add_output="$(
          ipa dnsrecord-add "{{ bastion_vm.domain }}" "{{ bastion_vm.name }}" \
            --a-rec="{{ bastion_guest_ipv4_address }}" 2>&1
        )" || add_rc=$?
        add_rc="${add_rc:-0}"
        if [ "${add_rc}" -eq 0 ]; then
          printf '%s\n' "${add_output}"
          exit 0
        fi

        mod_output="$(
          ipa dnsrecord-mod "{{ bastion_vm.domain }}" "{{ bastion_vm.name }}" \
            --a-rec="{{ bastion_guest_ipv4_address }}" 2>&1
        )" || mod_rc=$?
        mod_rc="${mod_rc:-0}"
        if [ "${mod_rc}" -eq 0 ] || grep -q 'no modifications to be performed' <<<"${mod_output}"; then
          printf '%s\n' "${mod_output}"
          exit 0
        fi

        printf '%s\n' "${add_output}" >&2
        printf '%s\n' "${mod_output}" >&2
        exit 1
      args:
        executable: /bin/bash
      register: bastion_guest_dns_a_record
      changed_when: >-
        'Added DNS resource record' in (bastion_guest_dns_a_record.stdout | default(''))
        or 'Modified DNS resource record' in (bastion_guest_dns_a_record.stdout | default(''))

    - name: Reassert the bastion PTR record in authoritative IdM DNS
      ansible.builtin.shell: |
        set -euo pipefail
        add_output="$(
          ipa dnsrecord-add "{{ bastion_guest_reverse_zone }}" "{{ bastion_guest_ipv4_address.split('.')[-1] }}" \
            --ptr-rec="{{ bastion_guest_vm_fqdn }}." 2>&1
        )" || add_rc=$?
        add_rc="${add_rc:-0}"
        if [ "${add_rc}" -eq 0 ]; then
          printf '%s\n' "${add_output}"
          exit 0
        fi

        mod_output="$(
          ipa dnsrecord-mod "{{ bastion_guest_reverse_zone }}" "{{ bastion_guest_ipv4_address.split('.')[-1] }}" \
            --ptr-rec="{{ bastion_guest_vm_fqdn }}." 2>&1
        )" || mod_rc=$?
        mod_rc="${mod_rc:-0}"
        if [ "${mod_rc}" -eq 0 ] || grep -q 'no modifications to be performed' <<<"${mod_output}"; then
          printf '%s\n' "${mod_output}"
          exit 0
        fi

        printf '%s\n' "${add_output}" >&2
        printf '%s\n' "${mod_output}" >&2
        exit 1
      args:
        executable: /bin/bash
      register: bastion_guest_dns_ptr_record
      changed_when: >-
        'Added DNS resource record' in (bastion_guest_dns_ptr_record.stdout | default(''))
        or 'Modified DNS resource record' in (bastion_guest_dns_ptr_record.stdout | default(''))

    - name: Assert authoritative IdM DNS resolves the bastion host
      ansible.builtin.command:
        argv:
          - dig
          - +short
          - "@{{ idm_vm.network.ipv4_address }}"
          - "{{ bastion_guest_vm_fqdn }}"
          - A
      register: bastion_guest_authoritative_dns
      changed_when: false
      retries: 12
      delay: 5
      until: >-
        (
          bastion_guest_authoritative_dns.stdout_lines
          | map('trim')
          | reject('equalto', '')
          | list
        ) == [bastion_guest_ipv4_address]
      failed_when: >-
        (
          bastion_guest_authoritative_dns.stdout_lines
          | map('trim')
          | reject('equalto', '')
          | list
        ) != [bastion_guest_ipv4_address]

- name: Check the current authselect profile on the bastion guest
  ansible.builtin.command:
    argv:
      - authselect
      - current
      - --raw
  register: bastion_guest_authselect_current
  changed_when: false

- name: Enable authselect mkhomedir support on the bastion guest
  ansible.builtin.command:
    argv:
      - authselect
      - select
      - sssd
      - with-mkhomedir
      - with-sudo
      - --force
  when: >-
    'with-mkhomedir' not in bastion_guest_authselect_current.stdout or
    'with-sudo' not in bastion_guest_authselect_current.stdout
  changed_when: true
  notify: Restart sssd

- name: Flush bastion firewalld handler
  ansible.builtin.meta: flush_handlers
