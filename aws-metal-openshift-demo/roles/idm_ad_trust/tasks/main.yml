---
- name: Validate optional AD trust input data
  ansible.builtin.assert:
    that:
      - idm_ad_trust.enabled | bool
      - idm_ad_trust.ad_domain | length > 0
      - idm_ad_trust.ad_realm | length > 0
      - idm_ad_trust.ad_server | length > 0
      - idm_ad_trust.ad_server_ip | length > 0
      - idm_ad_trust.ad_admin_user | length > 0
      - idm_ad_trust.ad_admin_password | length > 0
      - idm_ad_trust.idm_netbios_name | length > 0
      - idm_server.admin_password | length > 0
    fail_msg: >-
      vars/global/ad_integration.yml is missing required AD trust settings.

- name: Wait for AD LDAP to answer before configuring trust
  ansible.builtin.wait_for:
    host: "{{ idm_ad_trust.ad_server_ip }}"
    port: 389
    timeout: 900
    sleep: 10

- name: Ensure IdM named disables DNSSEC validation for the private AD trust zone
  ansible.builtin.lineinfile:
    path: /etc/named/ipa-options-ext.conf
    regexp: '^dnssec-validation\s+'
    line: 'dnssec-validation no;'
  when: idm_ad_trust.disable_dnssec_validation | bool
  register: idm_ad_trust_dnssec_config

- name: Validate the named configuration after the AD trust DNSSEC change
  ansible.builtin.command:
    argv:
      - named-checkconf
      - /etc/named.conf
  changed_when: false
  when:
    - idm_ad_trust.disable_dnssec_validation | bool
    - idm_ad_trust_dnssec_config.changed

- name: Restart named after the AD trust DNSSEC change
  ansible.builtin.systemd_service:
    name: named
    state: restarted
  when:
    - idm_ad_trust.disable_dnssec_validation | bool
    - idm_ad_trust_dnssec_config.changed

- name: Configure IdM AD trust support on the server
  freeipa.ansible_freeipa.ipaserver_setup_adtrust:
    setup_adtrust: true
    hostname: "{{ idm_vm.name }}.{{ idm_vm.domain }}"
    adtrust_netbios_name: "{{ idm_ad_trust.idm_netbios_name }}"
    adtrust_reset_netbios_name: false
    enable_compat: "{{ idm_ad_trust.enable_compat | bool }}"

- name: Ensure the AD DNS forward zone exists in IPA
  freeipa.ansible_freeipa.ipadnsforwardzone:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    state: present
    name:
      - "{{ idm_ad_trust.ad_domain }}"
    forwarders:
      - ip_address: "{{ idm_ad_trust.ad_server_ip }}"
    forwardpolicy: only

- name: Wait for the IdM DNS service to resolve the AD host through the forward zone
  ansible.builtin.command:
    argv:
      - host
      - "{{ idm_ad_trust.ad_dns_probe_fqdn }}"
      - "127.0.0.1"
  register: idm_ad_trust_forward_zone_host_lookup
  changed_when: false
  retries: 12
  delay: 5
  until: idm_ad_trust_forward_zone_host_lookup.rc == 0

- name: Wait for the IdM DNS service to resolve AD LDAP SRV records through the forward zone
  ansible.builtin.command:
    argv:
      - host
      - -t
      - SRV
      - "_ldap._tcp.dc._msdcs.{{ idm_ad_trust.ad_domain }}"
      - "127.0.0.1"
  register: idm_ad_trust_forward_zone_srv_lookup
  changed_when: false
  retries: 12
  delay: 5
  until: idm_ad_trust_forward_zone_srv_lookup.rc == 0

- name: Ensure the AD trust exists
  freeipa.ansible_freeipa.ipatrust:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    state: present
    realm: "{{ idm_ad_trust.ad_realm }}"
    trust_type: ad
    admin: "{{ idm_ad_trust.ad_admin_user }}"
    password: "{{ idm_ad_trust.ad_admin_password }}"
    server: "{{ idm_ad_trust.ad_server }}"
    range_type: "{{ idm_ad_trust.range_type }}"

- name: Clear cached SSSD data after trust changes
  ansible.builtin.command:
    argv:
      - sss_cache
      - -E
  changed_when: true

- name: Restart SSSD so trust data is picked up immediately
  ansible.builtin.systemd_service:
    name: sssd
    state: restarted

- name: Validate that the AD trust exists
  ansible.builtin.command:
    argv:
      - ipa
      - trust-show
      - "{{ idm_ad_trust.ad_domain }}"
  register: idm_ad_trust_validation
  changed_when: false

- name: Validate that SSSD sees the trusted AD domain on the IdM guest
  ansible.builtin.command:
    argv:
      - sssctl
      - domain-list
  register: idm_ad_trust_domain_list
  changed_when: false
  failed_when: idm_ad_trust.ad_domain not in idm_ad_trust_domain_list.stdout_lines
