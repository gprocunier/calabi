---
- name: Derive OpenShift DNS facts
  ansible.builtin.set_fact:
    idm_openshift_dns_zone: "{{ openshift_install_cluster.full_domain }}"
    idm_openshift_dns_idm_server_fqdn: "{{ idm_vm.name }}.{{ idm_vm.domain }}"
    idm_openshift_dns_admin_email: >-
      hostmaster.{{ openshift_install_cluster.full_domain }}
    idm_openshift_dns_ingress_record: >-
      {{ openshift_install_cluster.dns.ingress_record | default('ingress') }}
    idm_openshift_dns_storage_suffix: >-
      {{
        openshift_install_cluster.dns.storage_hostname_suffix
        | default('-storage')
      }}
    idm_openshift_dns_reverse_zones:
      - zone_name: >-
          {{
            (
              openshift_install_cluster.network.machine_cidr
              | regex_replace('/.*$', '')
            ).split('.')[2]
          }}.{{
            (
              openshift_install_cluster.network.machine_cidr
              | regex_replace('/.*$', '')
            ).split('.')[1]
          }}.{{
            (
              openshift_install_cluster.network.machine_cidr
              | regex_replace('/.*$', '')
            ).split('.')[0]
          }}.in-addr.arpa
      - zone_name: >-
          {{
            (
              openshift_install_cluster.network.storage_cidr
              | regex_replace('/.*$', '')
            ).split('.')[2]
          }}.{{
            (
              openshift_install_cluster.network.storage_cidr
              | regex_replace('/.*$', '')
            ).split('.')[1]
          }}.{{
            (
              openshift_install_cluster.network.storage_cidr
              | regex_replace('/.*$', '')
            ).split('.')[0]
          }}.in-addr.arpa

- name: Ensure the OpenShift forward DNS zone exists
  freeipa.ansible_freeipa.ipadnszone:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name: "{{ idm_openshift_dns_zone }}"
    name_server: "{{ idm_openshift_dns_idm_server_fqdn }}."
    admin_email: "{{ idm_openshift_dns_admin_email }}"
    dynamic_update: false
    state: present

- name: Ensure the OpenShift reverse DNS zones exist
  freeipa.ansible_freeipa.ipadnszone:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    name: "{{ item.zone_name }}"
    name_server: "{{ idm_openshift_dns_idm_server_fqdn }}."
    admin_email: "{{ idm_openshift_dns_admin_email }}"
    dynamic_update: false
    state: present
  loop: "{{ idm_openshift_dns_reverse_zones }}"
  loop_control:
    label: "{{ item.zone_name }}"

- name: Ensure API VIP forward records exist
  freeipa.ansible_freeipa.ipadnsrecord:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    zone_name: "{{ idm_openshift_dns_zone }}"
    name: "{{ item }}"
    record_type: A
    record_value: "{{ openshift_install_cluster.network.api_vip }}"
    state: present
  loop:
    - api
    - api-int

- name: Ensure ingress VIP forward records exist
  freeipa.ansible_freeipa.ipadnsrecord:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    zone_name: "{{ idm_openshift_dns_zone }}"
    name: "{{ item }}"
    record_type: A
    record_value: "{{ openshift_install_cluster.network.ingress_vip }}"
    state: present
  loop:
    - "{{ idm_openshift_dns_ingress_record }}"
    - "*.apps"

- name: Ensure reverse records exist for the API and ingress VIPs
  freeipa.ansible_freeipa.ipadnsrecord:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    zone_name: "{{ item.zone_name }}"
    name: "{{ item.record_name }}"
    record_type: PTR
    record_value: "{{ item.ptr_target }}"
    state: present
  loop:
    - zone_name: "{{ idm_openshift_dns_reverse_zones[0].zone_name }}"
      record_name: >-
        {{ openshift_install_cluster.network.api_vip.split('.')[-1] }}
      ptr_target: "{{ openshift_install_cluster.dns.api_fqdn }}."
    - zone_name: "{{ idm_openshift_dns_reverse_zones[0].zone_name }}"
      record_name: >-
        {{ openshift_install_cluster.network.ingress_vip.split('.')[-1] }}
      ptr_target: >-
        {{ idm_openshift_dns_ingress_record }}.{{ idm_openshift_dns_zone }}.
  loop_control:
    label: "{{ item.zone_name }}:{{ item.record_name }}"

- name: Build the list of node DNS record operations
  ansible.builtin.set_fact:
    idm_openshift_dns_node_records: >-
      {%- set records = [] -%}
      {%- for node in openshift_install_cluster.nodes -%}
      {%- set machine_name = (
        node.fqdn | regex_replace('\\.' ~ idm_openshift_dns_zone ~ '$', '')
      ) -%}
      {%- set storage_name = node.name ~ idm_openshift_dns_storage_suffix -%}
      {%- set _ = records.append({
        'zone_name': idm_openshift_dns_zone,
        'name': machine_name,
        'record_type': 'A',
        'record_value': node.machine_network.ipv4_address,
        'label': node.fqdn
      }) -%}
      {%- set _ = records.append({
        'zone_name': idm_openshift_dns_reverse_zones[0].zone_name,
        'name': node.machine_network.ipv4_address.split('.')[-1],
        'record_type': 'PTR',
        'record_value': node.fqdn ~ '.',
        'label': node.machine_network.ipv4_address
      }) -%}
      {%- set _ = records.append({
        'zone_name': idm_openshift_dns_zone,
        'name': storage_name,
        'record_type': 'A',
        'record_value': node.storage_network.ipv4_address,
        'label': storage_name ~ '.' ~ idm_openshift_dns_zone
      }) -%}
      {%- set _ = records.append({
        'zone_name': idm_openshift_dns_reverse_zones[1].zone_name,
        'name': node.storage_network.ipv4_address.split('.')[-1],
        'record_type': 'PTR',
        'record_value': (
          storage_name ~ '.' ~ idm_openshift_dns_zone ~ '.'
        ),
        'label': node.storage_network.ipv4_address
      }) -%}
      {%- endfor -%}
      {{ records }}

- name: Ensure all OpenShift node forward and reverse records exist
  freeipa.ansible_freeipa.ipadnsrecord:
    ipaadmin_password: "{{ idm_server.admin_password }}"
    ipaapi_context: server
    zone_name: "{{ item.zone_name }}"
    name: "{{ item.name }}"
    record_type: "{{ item.record_type }}"
    record_value: "{{ item.record_value }}"
    state: present
  loop: "{{ idm_openshift_dns_node_records }}"
  loop_control:
    label: "{{ item.label }}"
