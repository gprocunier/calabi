---
- name: Normalize partial AAP dictionary overrides  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    openshift_aap: >-
      {{
        openshift_aap_defaults
        | default({})
        | combine(openshift_aap | default({}), recursive=True)
      }}

- name: Derive remaining OpenShift AAP orchestration context
  ansible.builtin.set_fact:
    openshift_post_install_aap_oc_local_path: >-
      {{ lab_execution_tools_root }}/{{ mirror_registry_ocp_release }}/bin/oc
    openshift_post_install_aap_kubeconfig_local_path: >-
      {{ lab_execution_ocp_generated_root }}/auth/kubeconfig
    openshift_post_install_aap_idm_ca_local_path: >-
      {{ lab_execution_ocp_generated_root }}/idm-ca.crt
    openshift_post_install_aap_remote_oc_path: >-
      {{ openshift_post_install_aap_remote_dir }}/oc
    openshift_post_install_aap_remote_kubeconfig_path: >-
      {{ openshift_post_install_aap_remote_dir }}/kubeconfig
    openshift_post_install_aap_remote_idm_ca_path: >-
      {{ openshift_post_install_aap_remote_dir }}/idm-ca.crt
    openshift_post_install_aap_remote_operatorgroup_path: >-
      {{ openshift_post_install_aap_remote_dir }}/operatorgroup.yaml
    openshift_post_install_aap_remote_subscription_path: >-
      {{ openshift_post_install_aap_remote_dir }}/subscription.yaml
    openshift_post_install_aap_remote_instance_path: >-
      {{ openshift_post_install_aap_remote_dir }}/ansibleautomationplatform.yaml
    openshift_post_install_aap_remote_authenticator_payload_path: >-
      {{ openshift_post_install_aap_remote_dir }}/authenticator.json
    openshift_post_install_aap_remote_superuser_map_payload_path: >-
      {{ openshift_post_install_aap_remote_dir }}/superuser-map.json
    openshift_post_install_aap_keycloak_issuer_url: >-
      https://{{ openshift_keycloak.route_host }}/realms/{{ openshift_aap.keycloak.realm_name }}
    openshift_post_install_aap_keycloak_access_token_url: >-
      https://{{ openshift_keycloak.route_host }}/realms/{{ openshift_aap.keycloak.realm_name }}/protocol/openid-connect/token
    openshift_post_install_aap_keycloak_authorization_url: >-
      https://{{ openshift_keycloak.route_host }}/realms/{{ openshift_aap.keycloak.realm_name }}/protocol/openid-connect/auth
    openshift_post_install_aap_keycloak_admin_api_base_url: >-
      https://{{ openshift_keycloak.route_host }}/admin/realms
    openshift_post_install_aap_keycloak_client_redirect_uris:
      - "https://{{ openshift_aap.route_host }}/*"
    openshift_post_install_aap_authenticator_name: >-
      {{
        openshift_aap.keycloak.authenticator_name
        if (openshift_aap.authentication.mode | default('keycloak')) == 'keycloak'
        else openshift_aap.ldap.authenticator_name
      }}
    openshift_post_install_aap_required_group_names: >-
      {{
        openshift_aap.keycloak.required_group_names
        if (openshift_aap.authentication.mode | default('keycloak')) == 'keycloak'
        else []
      }}

- name: Derive the OpenShift AAP superuser map name
  ansible.builtin.set_fact:
    openshift_post_install_aap_superuser_map_name: >-
      {{
        (openshift_post_install_aap_required_group_names | first) ~ ' AAP superuser'
      }}

- name: Assert local AAP orchestration artifacts exist
  ansible.builtin.stat:
    path: "{{ item }}"
  delegate_to: localhost
  become: false
  loop:
    - "{{ openshift_post_install_aap_oc_local_path }}"
    - "{{ openshift_post_install_aap_kubeconfig_local_path }}"
    - "{{ openshift_post_install_aap_idm_ca_local_path }}"
  register: openshift_post_install_aap_local_stats

- name: Fail when required AAP orchestration artifacts are missing
  ansible.builtin.assert:
    that:
      - openshift_post_install_aap_local_stats.results | map(attribute='stat.exists') | min
    fail_msg: >-
      OpenShift AAP orchestration requires generated oc, kubeconfig, and
      idm-ca.crt artifacts.

- name: Create remote AAP workspace
  ansible.builtin.file:
    path: "{{ openshift_post_install_aap_remote_dir }}"
    state: directory
    mode: "0700"

- name: Copy pinned oc binary to remote AAP workspace
  ansible.builtin.copy:
    src: "{{ openshift_post_install_aap_oc_local_path }}"
    dest: "{{ openshift_post_install_aap_remote_oc_path }}"
    mode: "0755"

- name: Copy generated kubeconfig to remote AAP workspace
  ansible.builtin.copy:
    src: "{{ openshift_post_install_aap_kubeconfig_local_path }}"
    dest: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
    mode: "0600"

- name: Copy IdM CA to remote AAP workspace
  ansible.builtin.copy:
    src: "{{ openshift_post_install_aap_idm_ca_local_path }}"
    dest: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    mode: "0644"

- name: Render AAP operator group manifest
  ansible.builtin.template:
    src: operatorgroup.yaml.j2
    dest: "{{ openshift_post_install_aap_remote_operatorgroup_path }}"
    mode: "0644"

- name: Render AAP subscription manifest
  ansible.builtin.template:
    src: subscription.yaml.j2
    dest: "{{ openshift_post_install_aap_remote_subscription_path }}"
    mode: "0644"

- name: Render AAP instance manifest
  ansible.builtin.template:
    src: ansibleautomationplatform.yaml.j2
    dest: "{{ openshift_post_install_aap_remote_instance_path }}"
    mode: "0644"

- name: Ensure AAP namespace exists
  ansible.builtin.shell: |
    set -o pipefail
    "{{ openshift_post_install_aap_remote_oc_path }}" create namespace \
      "{{ openshift_aap.namespace }}" --dry-run=client -o yaml \
    | "{{ openshift_post_install_aap_remote_oc_path }}" apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Create AAP admin password secret
  ansible.builtin.shell: |
    set -o pipefail
    "{{ openshift_post_install_aap_remote_oc_path }}" create secret generic \
      "{{ openshift_aap.admin_password_secret_name }}" \
      -n "{{ openshift_aap.namespace }}" \
      --from-literal=password='{{ openshift_aap.admin_password }}' \
      --dry-run=client -o yaml \
    | "{{ openshift_post_install_aap_remote_oc_path }}" apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Create AAP IdM CA bundle secret
  ansible.builtin.shell: |
    set -o pipefail
    "{{ openshift_post_install_aap_remote_oc_path }}" create secret generic \
      "{{ openshift_aap.idm_ca_secret_name }}" \
      -n "{{ openshift_aap.namespace }}" \
      --from-file=bundle-ca.crt="{{ openshift_post_install_aap_remote_idm_ca_path }}" \
      --dry-run=client -o yaml \
    | "{{ openshift_post_install_aap_remote_oc_path }}" apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Apply AAP operator group
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - apply
      - -f
      - "{{ openshift_post_install_aap_remote_operatorgroup_path }}"
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Apply AAP subscription
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - apply
      - -f
      - "{{ openshift_post_install_aap_remote_subscription_path }}"
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Wait for AAP operator CSV to be selected
  ansible.builtin.shell: |
    set -o pipefail
    "{{ openshift_post_install_aap_remote_oc_path }}" get subscription \
      "{{ openshift_aap.subscription_name }}" \
      -n "{{ openshift_aap.namespace }}" \
      -o jsonpath='{.status.currentCSV}' | tr -d '\n'
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  register: openshift_post_install_aap_current_csv
  changed_when: false
  retries: 60
  delay: 10
  until: openshift_post_install_aap_current_csv.stdout | length > 0

- name: Wait for AAP operator CSV phase Succeeded
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - get
      - csv
      - "{{ openshift_post_install_aap_current_csv.stdout }}"
      - -n
      - "{{ openshift_aap.namespace }}"
      - -o
      - jsonpath={.status.phase}
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  register: openshift_post_install_aap_csv_phase
  changed_when: false
  retries: 60
  delay: 10
  until: openshift_post_install_aap_csv_phase.stdout == 'Succeeded'

- name: Apply AAP instance
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - apply
      - -f
      - "{{ openshift_post_install_aap_remote_instance_path }}"
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Wait for AAP gateway deployment to exist
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - get
      - deployment
      - "{{ openshift_aap.instance_name }}-gateway"
      - -n
      - "{{ openshift_aap.namespace }}"
      - -o
      - name
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  register: openshift_post_install_aap_gateway_deployment
  changed_when: false
  retries: 90
  delay: 10
  until: openshift_post_install_aap_gateway_deployment.rc == 0

- name: Apply AAP gateway deployment resource requests when requested
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - set
      - resources
      - "deployment/{{ openshift_aap.instance_name }}-gateway"
      - -n
      - "{{ openshift_aap.namespace }}"
      - --containers=proxy,api
      - >-
        --requests=cpu={{ openshift_aap.gateway_deployment.resource_requests.cpu }},memory={{ openshift_aap.gateway_deployment.resource_requests.memory }}
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true
  when:
    - openshift_aap.gateway_deployment.resource_requests.cpu | default('') | length > 0
    - openshift_aap.gateway_deployment.resource_requests.memory | default('') | length > 0

- name: Wait for AAP gateway deployment rollout
  block:
    - name: Wait for AAP gateway deployment rollout
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - rollout
          - status
          - "deployment/{{ openshift_aap.instance_name }}-gateway"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --timeout=15m
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_gateway_rollout
      changed_when: false
  rescue:
    - name: Derive the AAP gateway deployment selector for rollout recovery
      ansible.builtin.shell: |
        set -o pipefail
        "{{ openshift_post_install_aap_remote_oc_path }}" get deployment "{{ openshift_aap.instance_name }}-gateway" \
          -n "{{ openshift_aap.namespace }}" -o json \
        | jq -r '[.spec.selector.matchLabels // {} | to_entries[] | "\(.key)=\(.value)"] | join(",")'
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_gateway_selector
      changed_when: false

    - name: Discover non-ready AAP gateway pods for rollout recovery
      ansible.builtin.shell: |
        set -o pipefail
        selector="{{ openshift_post_install_aap_gateway_selector.stdout | trim }}"
        if [ -z "$selector" ]; then
          exit 0
        fi
        "{{ openshift_post_install_aap_remote_oc_path }}" get pods -n "{{ openshift_aap.namespace }}" --selector "$selector" -o json \
        | jq -r '[
            .items[]
            | select(
                (
                  .status.containerStatuses // []
                  | map(select(.ready == true))
                  | length
                ) !=
                (
                  .spec.containers // []
                  | length
                )
              )
            | .metadata.name
          ] | join(" ")'
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_gateway_recovery_pods
      changed_when: false

    - name: Delete non-ready AAP gateway pods so the deployment can recreate them
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - delete
          - pod
          - "{{ item }}"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --ignore-not-found=true
          - --force
          - --grace-period=0
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      changed_when: true
      loop: "{{ openshift_post_install_aap_gateway_recovery_pods.stdout.split() }}"
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_gateway_recovery_pods.stdout | trim | length > 0

    - name: Pause briefly for AAP gateway rollout recovery
      ansible.builtin.pause:
        seconds: "{{ openshift_post_install_aap_rollout_recovery_settle_seconds }}"
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_gateway_recovery_pods.stdout | trim | length > 0

    - name: Retry AAP gateway deployment rollout after recycling non-ready pods
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - rollout
          - status
          - "deployment/{{ openshift_aap.instance_name }}-gateway"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --timeout=15m
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      changed_when: false
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_gateway_recovery_pods.stdout | trim | length > 0

    - name: Fail when the AAP gateway rollout has no recoverable pod candidates
      ansible.builtin.fail:
        msg: >-
          AAP gateway rollout did not complete and no recoverable non-ready pods were found.
          selector={{ openshift_post_install_aap_gateway_selector.stdout | default('') }};
          recovery pods={{ openshift_post_install_aap_gateway_recovery_pods.stdout | default('') }}.
      when: >-
        (not (openshift_post_install_aap_rollout_recovery_enabled | bool))
        or
        (openshift_post_install_aap_gateway_recovery_pods.stdout | trim | length == 0)

- name: Wait for AAP controller deployment to exist
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - get
      - automationcontroller
      - "{{ openshift_aap.controller.name }}"
      - -n
      - "{{ openshift_aap.namespace }}"
      - -o
      - name
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  register: openshift_post_install_aap_controller_deployment_name
  changed_when: false
  retries: 90
  delay: 10
  until: openshift_post_install_aap_controller_deployment_name.stdout | length > 0

- name: Wait for AAP controller-web deployment object to exist
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - get
      - "deployment/{{ openshift_aap.controller.name }}-web"
      - -n
      - "{{ openshift_aap.namespace }}"
      - -o
      - name
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  register: openshift_post_install_aap_controller_web_deploy
  changed_when: false
  retries: 90
  delay: 10
  until: openshift_post_install_aap_controller_web_deploy.rc == 0

- name: Wait for primary AAP controller web deployment rollout
  block:
    - name: Wait for primary AAP controller web deployment rollout
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - rollout
          - status
          - "deployment/{{ openshift_aap.controller.name }}-web"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --timeout=20m
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_controller_web_rollout
      changed_when: false
  rescue:
    - name: Derive the AAP controller web deployment selector for rollout recovery
      ansible.builtin.shell: |
        set -o pipefail
        "{{ openshift_post_install_aap_remote_oc_path }}" get deployment "{{ openshift_aap.controller.name }}-web" \
          -n "{{ openshift_aap.namespace }}" -o json \
        | jq -r '[.spec.selector.matchLabels // {} | to_entries[] | "\(.key)=\(.value)"] | join(",")'
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_controller_web_selector
      changed_when: false

    - name: Discover non-ready AAP controller web pods for rollout recovery
      ansible.builtin.shell: |
        set -o pipefail
        selector="{{ openshift_post_install_aap_controller_web_selector.stdout | trim }}"
        if [ -z "$selector" ]; then
          exit 0
        fi
        "{{ openshift_post_install_aap_remote_oc_path }}" get pods -n "{{ openshift_aap.namespace }}" --selector "$selector" -o json \
        | jq -r '[
            .items[]
            | select(
                (
                  .status.containerStatuses // []
                  | map(select(.ready == true))
                  | length
                ) !=
                (
                  .spec.containers // []
                  | length
                )
              )
            | .metadata.name
          ] | join(" ")'
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_controller_web_recovery_pods
      changed_when: false

    - name: Delete non-ready AAP controller web pods so the deployment can recreate them
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - delete
          - pod
          - "{{ item }}"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --ignore-not-found=true
          - --force
          - --grace-period=0
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      changed_when: true
      loop: "{{ openshift_post_install_aap_controller_web_recovery_pods.stdout.split() }}"
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_controller_web_recovery_pods.stdout | trim | length > 0

    - name: Pause briefly for AAP controller web rollout recovery
      ansible.builtin.pause:
        seconds: "{{ openshift_post_install_aap_rollout_recovery_settle_seconds }}"
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_controller_web_recovery_pods.stdout | trim | length > 0

    - name: Retry AAP controller web deployment rollout after recycling non-ready pods
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - rollout
          - status
          - "deployment/{{ openshift_aap.controller.name }}-web"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --timeout=20m
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      changed_when: false
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_controller_web_recovery_pods.stdout | trim | length > 0

    - name: Fail when the AAP controller web rollout has no recoverable pod candidates
      ansible.builtin.fail:
        msg: >-
          AAP controller web rollout did not complete and no recoverable non-ready pods were found.
          selector={{ openshift_post_install_aap_controller_web_selector.stdout | default('') }};
          recovery pods={{ openshift_post_install_aap_controller_web_recovery_pods.stdout | default('') }}.
      when: >-
        (not (openshift_post_install_aap_rollout_recovery_enabled | bool))
        or
        (openshift_post_install_aap_controller_web_recovery_pods.stdout | trim | length == 0)

- name: Wait for primary AAP controller task deployment rollout
  block:
    - name: Wait for primary AAP controller task deployment rollout
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - rollout
          - status
          - "deployment/{{ openshift_aap.controller.name }}-task"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --timeout=20m
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_controller_task_rollout
      changed_when: false
  rescue:
    - name: Derive the AAP controller task deployment selector for rollout recovery
      ansible.builtin.shell: |
        set -o pipefail
        "{{ openshift_post_install_aap_remote_oc_path }}" get deployment "{{ openshift_aap.controller.name }}-task" \
          -n "{{ openshift_aap.namespace }}" -o json \
        | jq -r '[.spec.selector.matchLabels // {} | to_entries[] | "\(.key)=\(.value)"] | join(",")'
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_controller_task_selector
      changed_when: false

    - name: Discover non-ready AAP controller task pods for rollout recovery
      ansible.builtin.shell: |
        set -o pipefail
        selector="{{ openshift_post_install_aap_controller_task_selector.stdout | trim }}"
        if [ -z "$selector" ]; then
          exit 0
        fi
        "{{ openshift_post_install_aap_remote_oc_path }}" get pods -n "{{ openshift_aap.namespace }}" --selector "$selector" -o json \
        | jq -r '[
            .items[]
            | select(
                (
                  .status.containerStatuses // []
                  | map(select(.ready == true))
                  | length
                ) !=
                (
                  .spec.containers // []
                  | length
                )
              )
            | .metadata.name
          ] | join(" ")'
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      register: openshift_post_install_aap_controller_task_recovery_pods
      changed_when: false

    - name: Delete non-ready AAP controller task pods so the deployment can recreate them
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - delete
          - pod
          - "{{ item }}"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --ignore-not-found=true
          - --force
          - --grace-period=0
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      changed_when: true
      loop: "{{ openshift_post_install_aap_controller_task_recovery_pods.stdout.split() }}"
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_controller_task_recovery_pods.stdout | trim | length > 0

    - name: Pause briefly for AAP controller task rollout recovery
      ansible.builtin.pause:
        seconds: "{{ openshift_post_install_aap_rollout_recovery_settle_seconds }}"
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_controller_task_recovery_pods.stdout | trim | length > 0

    - name: Retry AAP controller task deployment rollout after recycling non-ready pods
      ansible.builtin.command:
        argv:
          - "{{ openshift_post_install_aap_remote_oc_path }}"
          - rollout
          - status
          - "deployment/{{ openshift_aap.controller.name }}-task"
          - -n
          - "{{ openshift_aap.namespace }}"
          - --timeout=20m
      environment:
        KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
      changed_when: false
      when:
        - openshift_post_install_aap_rollout_recovery_enabled | bool
        - openshift_post_install_aap_controller_task_recovery_pods.stdout | trim | length > 0

    - name: Fail when the AAP controller task rollout has no recoverable pod candidates
      ansible.builtin.fail:
        msg: >-
          AAP controller task rollout did not complete and no recoverable non-ready pods were found.
          selector={{ openshift_post_install_aap_controller_task_selector.stdout | default('') }};
          recovery pods={{ openshift_post_install_aap_controller_task_recovery_pods.stdout | default('') }}.
      when: >-
        (not (openshift_post_install_aap_rollout_recovery_enabled | bool))
        or
        (openshift_post_install_aap_controller_task_recovery_pods.stdout | trim | length == 0)

- name: Wait for AAP route to answer
  ansible.builtin.command:
    argv:
      - curl
      - -sk
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - "https://{{ openshift_aap.route_host }}/api/gateway/v1/ui_auth/"
  register: openshift_post_install_aap_ui_auth_status
  changed_when: false
  retries: 30
  delay: 10
  until: openshift_post_install_aap_ui_auth_status.stdout == '200'

- name: Obtain a Keycloak admin token for AAP authentication configuration
  ansible.builtin.uri:
    url: "https://{{ openshift_keycloak.route_host }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      grant_type: password
      username: "{{ openshift_keycloak.bootstrap_admin_username }}"
      password: "{{ openshift_keycloak.bootstrap_admin_password }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_keycloak_admin_token
  no_log: true

- name: Capture the current AAP Keycloak client in the OIDC realm
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients?clientId={{
      openshift_aap.keycloak.client_id }}
    method: GET
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_keycloak_client_get
  no_log: true

- name: Derive the AAP Keycloak client representation
  ansible.builtin.set_fact:
    openshift_post_install_aap_keycloak_client_representation:
      clientId: "{{ openshift_aap.keycloak.client_id }}"
      name: AAP Gateway
      enabled: true
      protocol: openid-connect
      publicClient: false
      secret: "{{ openshift_aap.keycloak.client_secret }}"
      standardFlowEnabled: true
      directAccessGrantsEnabled: true
      serviceAccountsEnabled: false
      frontchannelLogout: true
      redirectUris: "{{ openshift_post_install_aap_keycloak_client_redirect_uris }}"
      webOrigins:
        - "https://{{ openshift_aap.route_host }}"
      defaultClientScopes:
        - profile
        - email
        - roles
        - web-origins

- name: Create the AAP Keycloak client when missing
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients
    method: POST
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    body_format: json
    body: "{{ openshift_post_install_aap_keycloak_client_representation }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: [201, 409]
  when: (openshift_post_install_aap_keycloak_client_get.json | length) == 0
  changed_when: true
  no_log: true

- name: Refresh the current AAP Keycloak client state
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients?clientId={{
      openshift_aap.keycloak.client_id }}
    method: GET
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_keycloak_client_refresh
  no_log: true

- name: Update the AAP Keycloak client
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients/{{
      (openshift_post_install_aap_keycloak_client_refresh.json | first).id }}
    method: PUT
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    body_format: json
    body: >-
      {{
        openshift_post_install_aap_keycloak_client_representation
        | combine({'id': (openshift_post_install_aap_keycloak_client_refresh.json | first).id})
      }}
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 204
  changed_when: true
  no_log: true

- name: Capture current AAP Keycloak client protocol mappers
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients/{{
      (openshift_post_install_aap_keycloak_client_refresh.json | first).id }}/protocol-mappers/models
    method: GET
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_keycloak_client_protocol_mappers
  no_log: true

- name: Derive the AAP Keycloak group protocol mapper id
  ansible.builtin.set_fact:
    openshift_post_install_aap_keycloak_group_mapper_id: >-
      {{
        (
          openshift_post_install_aap_keycloak_client_protocol_mappers.json
          | selectattr('name', 'equalto', openshift_aap.keycloak.protocol_mapper.name)
          | map(attribute='id')
          | first
        ) | default('')
      }}
    openshift_post_install_aap_keycloak_group_protocol_mapper:
      name: "{{ openshift_aap.keycloak.protocol_mapper.name }}"
      protocol: openid-connect
      protocolMapper: oidc-group-membership-mapper
      config:
        full.path: "{{ openshift_aap.keycloak.protocol_mapper.full_path | ternary('true', 'false') }}"
        id.token.claim: "true"
        access.token.claim: "true"
        userinfo.token.claim: "true"
        claim.name: "{{ openshift_aap.keycloak.protocol_mapper.claim_name }}"
        multivalued: "true"
    openshift_post_install_aap_keycloak_audience_mapper_id: >-
      {{
        (
          openshift_post_install_aap_keycloak_client_protocol_mappers.json
          | selectattr('name', 'equalto', openshift_aap.keycloak.audience_mapper.name)
          | map(attribute='id')
          | first
        ) | default('')
      }}
    openshift_post_install_aap_keycloak_audience_protocol_mapper:
      name: "{{ openshift_aap.keycloak.audience_mapper.name }}"
      protocol: openid-connect
      protocolMapper: oidc-audience-mapper
      config:
        included.client.audience: "{{ openshift_aap.keycloak.audience_mapper.included_client_audience }}"
        id.token.claim: "true"
        access.token.claim: "true"
        userinfo.token.claim: "false"

- name: Create the AAP Keycloak group protocol mapper when missing
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients/{{
      (openshift_post_install_aap_keycloak_client_refresh.json | first).id }}/protocol-mappers/models
    method: POST
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    body_format: json
    body: "{{ openshift_post_install_aap_keycloak_group_protocol_mapper }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: [201, 409]
  when: openshift_post_install_aap_keycloak_group_mapper_id | length == 0
  changed_when: true
  no_log: true

- name: Update the AAP Keycloak group protocol mapper when present
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients/{{
      (openshift_post_install_aap_keycloak_client_refresh.json | first).id }}/protocol-mappers/models/{{
      openshift_post_install_aap_keycloak_group_mapper_id }}
    method: PUT
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    body_format: json
    body: >-
      {{
        openshift_post_install_aap_keycloak_group_protocol_mapper
        | combine({'id': openshift_post_install_aap_keycloak_group_mapper_id})
      }}
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 204
  when: openshift_post_install_aap_keycloak_group_mapper_id | length > 0
  changed_when: true
  no_log: true

- name: Create the AAP Keycloak audience protocol mapper when missing
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients/{{
      (openshift_post_install_aap_keycloak_client_refresh.json | first).id }}/protocol-mappers/models
    method: POST
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    body_format: json
    body: "{{ openshift_post_install_aap_keycloak_audience_protocol_mapper }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: [201, 409]
  when: openshift_post_install_aap_keycloak_audience_mapper_id | length == 0
  changed_when: true
  no_log: true

- name: Update the AAP Keycloak audience protocol mapper when present
  ansible.builtin.uri:
    url: >-
      {{ openshift_post_install_aap_keycloak_admin_api_base_url }}/{{ openshift_aap.keycloak.realm_name }}/clients/{{
      (openshift_post_install_aap_keycloak_client_refresh.json | first).id }}/protocol-mappers/models/{{
      openshift_post_install_aap_keycloak_audience_mapper_id }}
    method: PUT
    headers:
      Authorization: "Bearer {{ openshift_post_install_aap_keycloak_admin_token.json.access_token }}"
    body_format: json
    body: >-
      {{
        openshift_post_install_aap_keycloak_audience_protocol_mapper
        | combine({'id': openshift_post_install_aap_keycloak_audience_mapper_id})
      }}
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 204
  when: openshift_post_install_aap_keycloak_audience_mapper_id | length > 0
  changed_when: true
  no_log: true

- name: Capture the public Keycloak realm metadata for AAP authentication
  ansible.builtin.uri:
    url: "{{ openshift_post_install_aap_keycloak_issuer_url }}"
    method: GET
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_keycloak_realm_metadata
  no_log: true

- name: Assert the AAP Keycloak realm exposes a public key
  ansible.builtin.assert:
    that:
      - openshift_post_install_aap_keycloak_realm_metadata.json.public_key is defined
      - openshift_post_install_aap_keycloak_realm_metadata.json.public_key | length > 0
    fail_msg: The Keycloak realm for AAP authentication did not expose a public key.

- name: Render the AAP Keycloak authenticator payload
  ansible.builtin.set_fact:
    openshift_post_install_aap_authenticator_payload:
      name: "{{ openshift_aap.keycloak.authenticator_name }}"
      enabled: true
      create_objects: "{{ openshift_aap.authentication.create_objects }}"
      remove_users: "{{ openshift_aap.authentication.remove_users }}"
      type: ansible_base.authentication.authenticator_plugins.keycloak
      order: "{{ openshift_aap.authentication.order | int }}"
      configuration:
        ACCESS_TOKEN_URL: "{{ openshift_post_install_aap_keycloak_access_token_url }}"
        AUTHORIZATION_URL: "{{ openshift_post_install_aap_keycloak_authorization_url }}"
        KEY: "{{ openshift_aap.keycloak.client_id }}"
        PUBLIC_KEY: "{{ openshift_post_install_aap_keycloak_realm_metadata.json.public_key }}"
        SECRET: "{{ openshift_aap.keycloak.client_secret }}"
        GROUPS_CLAIM: "{{ openshift_aap.keycloak.groups_claim }}"

- name: Write the AAP Keycloak authenticator payload for debugging
  ansible.builtin.copy:
    dest: "{{ openshift_post_install_aap_remote_authenticator_payload_path }}"
    mode: "0600"
    content: "{{ openshift_post_install_aap_authenticator_payload | to_nice_json }}"

- name: Render the AAP Keycloak superuser-map payload
  ansible.builtin.set_fact:
    openshift_post_install_aap_superuser_map_payload:
      name: "{{ openshift_post_install_aap_superuser_map_name }}"
      map_type: is_superuser
      revoke: true
      triggers:
        groups:
          has_or: "{{ openshift_post_install_aap_required_group_names }}"

- name: Write the AAP Keycloak superuser-map payload for debugging
  ansible.builtin.copy:
    dest: "{{ openshift_post_install_aap_remote_superuser_map_payload_path }}"
    mode: "0600"
    content: "{{ openshift_post_install_aap_superuser_map_payload | to_nice_json }}"

- name: Capture existing AAP authenticators
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticators/"
    method: GET
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_authenticators
  no_log: true

- name: Derive the current AAP authenticator ids
  ansible.builtin.set_fact:
    openshift_post_install_aap_authenticator_id: >-
      {{
        (
          openshift_post_install_aap_authenticators.json.results
          | selectattr('name', 'equalto', openshift_aap.keycloak.authenticator_name)
          | map(attribute='id')
          | first
        ) | default('')
      }}
    openshift_post_install_aap_legacy_ldap_authenticator_id: >-
      {{
        (
          openshift_post_install_aap_authenticators.json.results
          | selectattr('name', 'equalto', openshift_aap.ldap.authenticator_name)
          | map(attribute='id')
          | first
        ) | default('')
      }}

- name: Create the AAP Keycloak authenticator when absent
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticators/"
    method: POST
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    body_format: json
    body: "{{ openshift_post_install_aap_authenticator_payload }}"
    validate_certs: false
    status_code: 201
    return_content: true
  register: openshift_post_install_aap_authenticator_create
  when: openshift_post_install_aap_authenticator_id | length == 0
  changed_when: true
  no_log: true

- name: Update the AAP Keycloak authenticator when present
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticators/{{ openshift_post_install_aap_authenticator_id }}/"
    method: PUT
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    body_format: json
    body: "{{ openshift_post_install_aap_authenticator_payload | combine({'id': (openshift_post_install_aap_authenticator_id | int)}) }}"
    validate_certs: false
    status_code: 200
    return_content: true
  when: openshift_post_install_aap_authenticator_id | length > 0
  changed_when: true
  no_log: true

- name: Refresh the resulting AAP authenticators
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticators/"
    method: GET
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_authenticators_refresh
  no_log: true

- name: Derive the resulting AAP Keycloak authenticator id
  ansible.builtin.set_fact:
    openshift_post_install_aap_authenticator_id: >-
      {{
        (
          openshift_post_install_aap_authenticators_refresh.json.results
          | selectattr('name', 'equalto', openshift_aap.keycloak.authenticator_name)
          | map(attribute='id')
          | first
        ) | default('')
      }}
    openshift_post_install_aap_legacy_ldap_authenticator_id: >-
      {{
        (
          openshift_post_install_aap_authenticators_refresh.json.results
          | selectattr('name', 'equalto', openshift_aap.ldap.authenticator_name)
          | map(attribute='id')
          | first
        ) | default('')
      }}

- name: Assert the AAP Keycloak authenticator exists
  ansible.builtin.assert:
    that:
      - openshift_post_install_aap_authenticator_id | length > 0
    fail_msg: AAP Keycloak authenticator was not created successfully.

- name: Capture existing AAP authenticator maps
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticator_maps/"
    method: GET
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_authenticator_maps
  no_log: true

- name: Derive the current AAP superuser map id
  ansible.builtin.set_fact:
    openshift_post_install_aap_superuser_map_id: >-
      {{
        (
          openshift_post_install_aap_authenticator_maps.json.results
          | selectattr('name', 'equalto', openshift_post_install_aap_superuser_map_name)
          | map(attribute='id')
          | first
        ) | default('')
      }}
    openshift_post_install_aap_legacy_ldap_map_ids: >-
      {{
        (
          openshift_post_install_aap_authenticator_maps.json.results
          | selectattr('authenticator', 'equalto', (openshift_post_install_aap_legacy_ldap_authenticator_id | int))
          | map(attribute='id')
          | list
        )
        if openshift_post_install_aap_legacy_ldap_authenticator_id | length > 0
        else []
      }}

- name: Create the AAP Keycloak superuser map when absent
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticator_maps/"
    method: POST
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    body_format: json
    body: "{{ openshift_post_install_aap_superuser_map_payload | combine({'authenticator': (openshift_post_install_aap_authenticator_id | int)}) }}"
    validate_certs: false
    status_code: 201
    return_content: true
  when: openshift_post_install_aap_superuser_map_id | length == 0
  changed_when: true
  no_log: true

- name: Update the AAP Keycloak superuser map when present
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticator_maps/{{ openshift_post_install_aap_superuser_map_id }}/"
    method: PUT
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    body_format: json
    body: "{{ openshift_post_install_aap_superuser_map_payload | combine({'id': (openshift_post_install_aap_superuser_map_id | int), 'authenticator': (openshift_post_install_aap_authenticator_id | int)}) }}"
    validate_certs: false
    status_code: 200
    return_content: true
  when: openshift_post_install_aap_superuser_map_id | length > 0
  changed_when: true
  no_log: true

- name: Delete any legacy AAP LDAP authenticator maps
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticator_maps/{{ item }}/"
    method: DELETE
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 204
  loop: "{{ openshift_post_install_aap_legacy_ldap_map_ids }}"
  when: openshift_post_install_aap_legacy_ldap_map_ids | length > 0
  changed_when: true
  no_log: true

- name: Delete the legacy AAP LDAP authenticator when present
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/authenticators/{{ openshift_post_install_aap_legacy_ldap_authenticator_id }}/"
    method: DELETE
    url_username: "{{ openshift_aap.admin_username }}"
    url_password: "{{ openshift_aap.admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 204
  when: openshift_post_install_aap_legacy_ldap_authenticator_id | length > 0
  changed_when: true
  no_log: true

- name: Restart AAP gateway deployment after CA bundle/auth changes
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - rollout
      - restart
      - "deployment/{{ openshift_aap.instance_name }}-gateway"
      - -n
      - "{{ openshift_aap.namespace }}"
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: true

- name: Wait for AAP gateway rollout after authentication changes
  ansible.builtin.command:
    argv:
      - "{{ openshift_post_install_aap_remote_oc_path }}"
      - rollout
      - status
      - "deployment/{{ openshift_aap.instance_name }}-gateway"
      - -n
      - "{{ openshift_aap.namespace }}"
      - --timeout=15m
  environment:
    KUBECONFIG: "{{ openshift_post_install_aap_remote_kubeconfig_path }}"
  changed_when: false

- name: Capture AAP UI authentication options after Keycloak changes
  ansible.builtin.uri:
    url: "https://{{ openshift_aap.route_host }}/api/gateway/v1/ui_auth/"
    method: GET
    validate_certs: false
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_ui_auth

- name: Assert AAP UI authentication exposes the Keycloak SSO entry
  ansible.builtin.assert:
    that:
      - >-
        (
          openshift_post_install_aap_ui_auth.json.ssos
          | selectattr('name', 'equalto', openshift_aap.keycloak.authenticator_name)
          | list
          | length
        ) > 0
      - >-
        (
          openshift_post_install_aap_ui_auth.json.passwords
          | selectattr('name', 'equalto', openshift_aap.ldap.authenticator_name)
          | list
          | length
        ) == 0
    fail_msg: AAP UI authentication did not expose the expected Keycloak SSO entry cleanly.

- name: Validate Keycloak token issuance for the configured AAP SSO user
  ansible.builtin.uri:
    url: "{{ openshift_post_install_aap_keycloak_access_token_url }}"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: "{{ openshift_aap.keycloak.client_id }}"
      client_secret: "{{ openshift_aap.keycloak.client_secret }}"
      grant_type: password
      username: "{{ openshift_aap.keycloak.validation_username }}"
      password: "{{ openshift_aap.keycloak.validation_password }}"
    validate_certs: true
    ca_path: "{{ openshift_post_install_aap_remote_idm_ca_path }}"
    status_code: 200
    return_content: true
  register: openshift_post_install_aap_keycloak_validation_token
  no_log: true

- name: Decode the AAP Keycloak access token claims
  ansible.builtin.shell: |
    python3 - <<'PY'
    import base64, json, os
    token = os.environ["OIDC_ACCESS_TOKEN"]
    payload = token.split(".")[1]
    payload += "=" * (-len(payload) % 4)
    print(json.dumps(json.loads(base64.urlsafe_b64decode(payload.encode()).decode())))
    PY
  args:
    executable: /bin/bash
  register: openshift_post_install_aap_keycloak_token_claims
  changed_when: false
  environment:
    OIDC_ACCESS_TOKEN: "{{ openshift_post_install_aap_keycloak_validation_token.json.access_token }}"
  no_log: true

- name: Assert the AAP Keycloak access token includes the required admin group
  ansible.builtin.assert:
    that:
      - openshift_post_install_aap_keycloak_validation_token.json.access_token is defined
      - >-
        (
          openshift_aap.keycloak.required_group_names
          | difference(
              (
                (openshift_post_install_aap_keycloak_token_claims.stdout | from_json).groups
                | default([])
              )
            )
          | length
        ) == 0
    fail_msg: The AAP Keycloak access token did not contain the expected admin group claims.
  no_log: true

- name: Validate AAP Keycloak login for the configured user
  ansible.builtin.shell: |
    set -o pipefail
    python3 - <<'PY'
    import html, json, re, sys, urllib.parse
    import requests

    aap_base = "https://{{ openshift_aap.route_host }}"
    username = {{ openshift_aap.keycloak.validation_username | to_json }}
    password = {{ openshift_aap.keycloak.validation_password | to_json }}
    authenticator_name = {{ openshift_aap.keycloak.authenticator_name | to_json }}

    session = requests.Session()
    session.verify = False

    ui_auth = session.get(f"{aap_base}/api/gateway/v1/ui_auth/", timeout=30)
    ui_auth.raise_for_status()
    payload = ui_auth.json()
    sso_entry = next((item for item in payload.get("ssos", []) if item.get("name") == authenticator_name), None)
    if not sso_entry:
        raise SystemExit("missing_sso_entry")

    login_url = (
        sso_entry.get("login_url")
        or sso_entry.get("url")
        or sso_entry.get("href")
    )
    if not login_url and sso_entry.get("slug"):
        login_url = f"/api/gateway/v1/login/{sso_entry['slug']}/"
    if not login_url:
        raise SystemExit("missing_sso_login_url")
    login_url = urllib.parse.urljoin(aap_base, login_url)

    login_page = session.get(login_url, allow_redirects=True, timeout=60)
    login_page.raise_for_status()
    form_match = re.search(r'<form[^>]+id=["\\\']kc-form-login["\\\'][^>]+action=["\\\']([^"\\\']+)', login_page.text)
    if not form_match:
        form_match = re.search(r'<form[^>]+action=["\\\']([^"\\\']+)[^>]*id=["\\\']kc-form-login["\\\']', login_page.text)
    if not form_match:
        raise SystemExit("missing_keycloak_login_form")
    action_url = urllib.parse.urljoin(login_page.url, html.unescape(form_match.group(1)))

    fields = {name: value for name, value in re.findall(r'<input[^>]+type=["\\\']hidden["\\\'][^>]+name=["\\\']([^"\\\']+)["\\\'][^>]+value=["\\\']([^"\\\']*)["\\\']', login_page.text)}
    fields["username"] = username
    fields["password"] = password
    fields.setdefault("credentialId", "")

    complete = session.post(action_url, data=fields, allow_redirects=True, timeout=90)
    if "Invalid username or password" in complete.text:
        raise SystemExit("keycloak_login_rejected")
    if "aap.apps.ocp.workshop.lan" not in complete.url:
        raise SystemExit(f"unexpected_final_url={complete.url}")

    users_response = session.get(f"{aap_base}/api/gateway/v1/users/", allow_redirects=False, timeout=30)
    if users_response.status_code != 200:
        raise SystemExit(f"unexpected_users_status={users_response.status_code}")

    print(json.dumps({
        "final_url": complete.url,
        "users_status": users_response.status_code,
        "sso_entry": sso_entry
    }))
    PY
  args:
    executable: /bin/bash
  register: openshift_post_install_aap_keycloak_login_status
  changed_when: false
  no_log: true
