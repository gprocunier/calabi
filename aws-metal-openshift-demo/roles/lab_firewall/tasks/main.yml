---
- name: Create the dedicated firewalld zone for routed lab VLANs
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --new-zone=lab
  register: lab_firewall_new_zone
  changed_when: "'success' in lab_firewall_new_zone.stdout"
  failed_when:
    - lab_firewall_new_zone.rc != 0
    - "'NAME_CONFLICT' not in lab_firewall_new_zone.stderr"

- name: Query the current target of the lab firewalld zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=lab
      - --get-target
  register: lab_firewall_zone_target_query
  changed_when: false

- name: Set the lab firewalld zone target to ACCEPT
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=lab
      - --set-target=ACCEPT
  when: lab_firewall_zone_target_query.stdout | trim != "ACCEPT"
  register: lab_firewall_zone_target_set
  changed_when: true

- name: Query whether intra-zone forwarding is enabled on the lab zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=lab
      - --query-forward
  register: lab_firewall_zone_forward_query
  changed_when: false
  failed_when: false

- name: Enable intra-zone forwarding on the lab firewalld zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=lab
      - --add-forward
  when: lab_firewall_zone_forward_query.rc != 0
  register: lab_firewall_zone_forward_set
  changed_when: true

- name: Query routed VLAN firewalld zone membership
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=lab
      - >-
        --query-interface={{ item.key }}
  loop: "{{ lab_routed_ports }}"
  register: lab_firewall_lab_interface_queries
  changed_when: false
  failed_when: false

- name: Place routed VLAN interfaces into the lab firewalld zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=lab
      - --change-interface={{ item.item.key }}
  loop: "{{ lab_firewall_lab_interface_queries.results }}"
  when: item.rc != 0
  register: lab_firewall_lab_interfaces_set
  changed_when: true

- name: Query whether the uplink interface is already in the external zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --zone=external
      - --query-interface={{ lab_uplink_interface }}
  register: lab_firewall_uplink_query
  changed_when: false
  failed_when: false

- name: Place the uplink interface into the external firewalld zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=external
      - --change-interface={{ lab_uplink_interface }}
  when: lab_firewall_uplink_query.rc != 0
  register: lab_firewall_uplink_set
  changed_when: true

- name: Query whether masquerade is enabled on the external zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=external
      - --query-masquerade
  register: lab_firewall_masquerade_query
  changed_when: false
  failed_when: false

- name: Enable masquerade on the external firewalld zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --zone=external
      - --add-masquerade
  when: lab_firewall_masquerade_query.rc != 0
  register: lab_firewall_masquerade_set
  changed_when: true

- name: Create the lab-to-external firewalld policy
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --new-policy=lab-to-external
  register: lab_firewall_new_policy
  changed_when: "'success' in lab_firewall_new_policy.stdout"
  failed_when:
    - lab_firewall_new_policy.rc != 0
    - "'NAME_CONFLICT' not in lab_firewall_new_policy.stderr"

- name: Query the target of the lab-to-external firewalld policy
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --policy=lab-to-external
      - --get-target
  register: lab_firewall_policy_target_query
  changed_when: false

- name: Set the lab-to-external firewalld policy target to ACCEPT
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --policy=lab-to-external
      - --set-target=ACCEPT
  when: lab_firewall_policy_target_query.stdout | trim != "ACCEPT"
  register: lab_firewall_policy_target_set
  changed_when: true

- name: Add the lab firewalld zone as lab-to-external policy ingress
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --policy=lab-to-external
      - --add-ingress-zone=lab
  register: lab_firewall_policy_ingress_set
  changed_when: "'success' in lab_firewall_policy_ingress_set.stdout"
  failed_when:
    - lab_firewall_policy_ingress_set.rc != 0
    - "'ALREADY_ENABLED' not in lab_firewall_policy_ingress_set.stderr"

- name: Add the external firewalld zone as lab-to-external policy egress
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - --policy=lab-to-external
      - --add-egress-zone=external
  register: lab_firewall_policy_egress_set
  changed_when: "'success' in lab_firewall_policy_egress_set.stdout"
  failed_when:
    - lab_firewall_policy_egress_set.rc != 0
    - "'ALREADY_ENABLED' not in lab_firewall_policy_egress_set.stderr"

- name: Query whether the runtime lab firewalld zone is available
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --zone=lab
      - --get-target
  register: lab_firewall_runtime_lab_zone_query
  changed_when: false
  failed_when: false

- name: Query whether the runtime lab-to-external policy is available
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --info-policy=lab-to-external
  register: lab_firewall_runtime_policy_query
  changed_when: false
  failed_when: false

- name: Reload firewalld to apply zone changes
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --reload
  when:
    - lab_firewall_new_zone.changed
      or
      (lab_firewall_zone_target_set is defined
      and lab_firewall_zone_target_set.changed)
      or
      (lab_firewall_zone_forward_set is defined
      and lab_firewall_zone_forward_set.changed)
      or
      (lab_firewall_lab_interfaces_set is defined
      and lab_firewall_lab_interfaces_set.changed)
      or
      (lab_firewall_uplink_set is defined
      and lab_firewall_uplink_set.changed)
      or
      (lab_firewall_masquerade_set is defined
      and lab_firewall_masquerade_set.changed)
      or
      lab_firewall_new_policy.changed
      or
      (lab_firewall_policy_target_set is defined
      and lab_firewall_policy_target_set.changed)
      or
      lab_firewall_policy_ingress_set.changed
      or
      lab_firewall_policy_egress_set.changed
      or
      lab_firewall_runtime_lab_zone_query.rc != 0
      or
      lab_firewall_runtime_policy_query.rc != 0
  changed_when: true
