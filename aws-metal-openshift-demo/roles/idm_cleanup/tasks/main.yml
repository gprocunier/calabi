---
- name: Derive IDM cleanup facts
  ansible.builtin.set_fact:
    idm_cleanup_vm_fqdn: "{{ idm_vm.name }}.{{ idm_vm.domain }}"
    idm_cleanup_runtime_dir: "{{ idm_cleanup_runtime_root }}/{{ idm_vm.name }}"

- name: Check whether the IDM libvirt domain exists
  ansible.builtin.command:
    argv:
      - virsh
      - dominfo
      - "{{ idm_cleanup_vm_fqdn }}"
  register: idm_cleanup_domain_info
  changed_when: false
  failed_when: false

- name: Stop the IDM VM when it exists
  ansible.builtin.command:
    argv:
      - virsh
      - destroy
      - "{{ idm_cleanup_vm_fqdn }}"
  when: idm_cleanup_domain_info.rc == 0
  changed_when: true
  failed_when: false

- name: Undefine the IDM VM when it exists
  ansible.builtin.command:
    argv:
      - virsh
      - undefine
      - "{{ idm_cleanup_vm_fqdn }}"
      - --nvram
  when: idm_cleanup_domain_info.rc == 0
  changed_when: true
  failed_when: false

- name: Remove the IDM runtime directory
  ansible.builtin.file:
    path: "{{ idm_cleanup_runtime_dir }}"
    state: absent
  when: idm_cleanup_remove_runtime_dir | bool

- name: Check whether the IDM block device exists
  ansible.builtin.stat:
    path: "{{ idm_vm.disk_path }}"
  register: idm_cleanup_block_device
  when: idm_cleanup_wipe_block_device | bool

- name: Clear the beginning of the IDM block device when requested
  ansible.builtin.command:
    argv:
      - dd
      - if=/dev/zero
      - of={{ idm_vm.disk_path }}
      - bs=1M
      - count=16
      - conv=fsync
  when:
    - idm_cleanup_wipe_block_device | bool
    - idm_cleanup_block_device.stat.exists | default(false)
  changed_when: true
