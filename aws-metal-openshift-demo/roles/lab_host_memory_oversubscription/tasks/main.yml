---
- name: Validate host memory oversubscription variables
  ansible.builtin.assert:
    that:
      - lab_host_memory_oversubscription.enabled is boolean
      - lab_host_memory_oversubscription.verify_state is boolean
      - lab_host_memory_oversubscription.zram.enabled is boolean
      - lab_host_memory_oversubscription.transparent_hugepages.enabled is boolean
      - lab_host_memory_oversubscription.ksm.enabled is boolean
      - lab_host_memory_oversubscription.zram.device_name | length > 0
      - lab_host_memory_oversubscription.zram.size | length > 0
      - lab_host_memory_oversubscription.zram.swap_priority | int >= -1
      - lab_host_memory_oversubscription.transparent_hugepages.mode in ['always', 'madvise', 'never']
      - lab_host_memory_oversubscription.transparent_hugepages.defrag_mode in ['always', 'defer', 'defer+madvise', 'madvise', 'never']
      - (lab_host_memory_oversubscription.ksm.run | int) in [0, 1]
      - (lab_host_memory_oversubscription.ksm.pages_to_scan | int) > 0
      - (lab_host_memory_oversubscription.ksm.sleep_millisecs | int) > 0
  when: lab_host_memory_oversubscription.enabled | bool

- name: Check whether the zram device is already active
  ansible.builtin.shell: |
    set -euo pipefail
    swapon --show=NAME --noheadings | awk '$1=="/dev/{{ lab_host_memory_oversubscription.zram.device_name }}"{found=1} END{exit(found?0:1)}'
  args:
    executable: /bin/bash
  register: lab_host_memory_oversubscription_zram_active
  changed_when: false
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.zram.enabled | bool

- name: Check whether the policy service is already enabled
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - calabi-host-memory-oversubscription.service
  register: lab_host_memory_oversubscription_service_enabled
  changed_when: false
  failed_when: false
  when: lab_host_memory_oversubscription.enabled | bool

- name: Check whether the policy service is already active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - calabi-host-memory-oversubscription.service
  register: lab_host_memory_oversubscription_service_active
  changed_when: false
  failed_when: false
  when: lab_host_memory_oversubscription.enabled | bool

- name: Ensure host memory oversubscription directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/systemd/system
  when: lab_host_memory_oversubscription.enabled | bool

- name: Check that zramctl is available on the host
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - command -v zramctl
  register: lab_host_memory_oversubscription_zramctl
  changed_when: false
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.zram.enabled | bool

- name: Fail when zramctl is unavailable on the host
  ansible.builtin.assert:
    that:
      - lab_host_memory_oversubscription_zramctl.rc == 0
    fail_msg: >-
      zramctl is not available on the host, so the explicit zram orchestration
      path cannot be applied.
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.zram.enabled | bool

- name: Install the host memory oversubscription policy unit
  ansible.builtin.template:
    src: host-memory-oversubscription.service.j2
    dest: /etc/systemd/system/calabi-host-memory-oversubscription.service
    owner: root
    group: root
    mode: "0644"
  register: lab_host_memory_oversubscription_unit
  when: lab_host_memory_oversubscription.enabled | bool

- name: Reload systemd after host memory oversubscription changes
  ansible.builtin.command:
    argv:
      - systemctl
      - daemon-reload
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - not ansible_check_mode
    - lab_host_memory_oversubscription_unit.changed
  changed_when: true

- name: Ensure the host memory oversubscription policy service is enabled and active
  ansible.builtin.systemd:
    name: calabi-host-memory-oversubscription.service
    enabled: true
    state: started
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - not ansible_check_mode
    - >-
      lab_host_memory_oversubscription_unit.changed or
      (lab_host_memory_oversubscription_service_enabled.rc | default(1)) != 0 or
      (lab_host_memory_oversubscription_service_active.rc | default(1)) != 0

- name: Stop the generator-managed zram unit when the explicit service definition changed
  ansible.builtin.systemd:
    name: "systemd-zram-setup@{{ lab_host_memory_oversubscription.zram.device_name }}.service"
    state: stopped
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.zram.enabled | bool
    - not ansible_check_mode
    - lab_host_memory_oversubscription_unit.changed

- name: Start or restart the explicit zram service when needed
  ansible.builtin.systemd:
    name: calabi-host-memory-oversubscription.service
    state: >-
      {{ 'restarted'
         if lab_host_memory_oversubscription_unit.changed
         else 'started' }}
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.zram.enabled | bool
    - not ansible_check_mode
    - >-
      lab_host_memory_oversubscription_unit.changed or
      (lab_host_memory_oversubscription_zram_active.rc | default(1)) != 0

- name: Read the current THP enabled mode
  ansible.builtin.command:
    argv:
      - cat
      - /sys/kernel/mm/transparent_hugepage/enabled
  register: lab_host_memory_oversubscription_thp_enabled
  changed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
    - lab_host_memory_oversubscription.transparent_hugepages.enabled | bool

- name: Read the current THP defrag mode
  ansible.builtin.command:
    argv:
      - cat
      - /sys/kernel/mm/transparent_hugepage/defrag
  register: lab_host_memory_oversubscription_thp_defrag
  changed_when: false
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
    - lab_host_memory_oversubscription.transparent_hugepages.enabled | bool

- name: Read the current KSM run state
  ansible.builtin.command:
    argv:
      - cat
      - /sys/kernel/mm/ksm/run
  register: lab_host_memory_oversubscription_ksm_run
  changed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
    - lab_host_memory_oversubscription.ksm.enabled | bool

- name: Read the current KSM pages-to-scan value
  ansible.builtin.command:
    argv:
      - cat
      - /sys/kernel/mm/ksm/pages_to_scan
  register: lab_host_memory_oversubscription_ksm_pages_to_scan
  changed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
    - lab_host_memory_oversubscription.ksm.enabled | bool

- name: Read the current KSM sleep interval
  ansible.builtin.command:
    argv:
      - cat
      - /sys/kernel/mm/ksm/sleep_millisecs
  register: lab_host_memory_oversubscription_ksm_sleep_millisecs
  changed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
    - lab_host_memory_oversubscription.ksm.enabled | bool

- name: Re-check whether the zram device is active after policy application
  ansible.builtin.shell: |
    set -euo pipefail
    swapon --show=NAME --noheadings | awk '$1=="/dev/{{ lab_host_memory_oversubscription.zram.device_name }}"{found=1} END{exit(found?0:1)}'
  args:
    executable: /bin/bash
  register: lab_host_memory_oversubscription_zram_active_post
  changed_when: false
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
    - lab_host_memory_oversubscription.zram.enabled | bool

- name: Re-check whether the policy service is enabled after policy application
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - calabi-host-memory-oversubscription.service
  register: lab_host_memory_oversubscription_service_enabled_post
  changed_when: false
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool

- name: Re-check whether the policy service is active after policy application
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - calabi-host-memory-oversubscription.service
  register: lab_host_memory_oversubscription_service_active_post
  changed_when: false
  failed_when: false
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool

- name: Verify the host memory oversubscription state
  ansible.builtin.assert:
    that:
      - (lab_host_memory_oversubscription_service_enabled_post.stdout | trim) == 'enabled'
      - (lab_host_memory_oversubscription_service_active_post.stdout | trim) == 'active'
      - not (lab_host_memory_oversubscription.zram.enabled | bool) or lab_host_memory_oversubscription_zram_active_post.rc == 0
      - not (lab_host_memory_oversubscription.transparent_hugepages.enabled | bool) or ('[' ~ lab_host_memory_oversubscription.transparent_hugepages.mode ~ ']') in lab_host_memory_oversubscription_thp_enabled.stdout
      - not (lab_host_memory_oversubscription.transparent_hugepages.enabled | bool) or (lab_host_memory_oversubscription_thp_defrag.rc != 0 or ('[' ~ lab_host_memory_oversubscription.transparent_hugepages.defrag_mode ~ ']') in lab_host_memory_oversubscription_thp_defrag.stdout)
      - not (lab_host_memory_oversubscription.ksm.enabled | bool) or (lab_host_memory_oversubscription_ksm_run.stdout | trim | int) == (lab_host_memory_oversubscription.ksm.run | int)
      - not (lab_host_memory_oversubscription.ksm.enabled | bool) or (lab_host_memory_oversubscription_ksm_pages_to_scan.stdout | trim | int) == (lab_host_memory_oversubscription.ksm.pages_to_scan | int)
      - not (lab_host_memory_oversubscription.ksm.enabled | bool) or (lab_host_memory_oversubscription_ksm_sleep_millisecs.stdout | trim | int) == (lab_host_memory_oversubscription.ksm.sleep_millisecs | int)
    fail_msg: >-
      The host memory oversubscription policy did not converge to the expected
      zram, THP, or KSM state.
  when:
    - lab_host_memory_oversubscription.enabled | bool
    - lab_host_memory_oversubscription.verify_state | bool
