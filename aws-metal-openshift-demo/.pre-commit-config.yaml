---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        args:
          - -c
          - .yamllint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$
        args:
          - -S
          - warning
          - -e
          - SC2029,SC2034

  - repo: local
    hooks:
      - id: validate-orchestration
        name: validate-orchestration
        entry: ./scripts/validate-orchestration.sh
        language: system
        pass_filenames: false
