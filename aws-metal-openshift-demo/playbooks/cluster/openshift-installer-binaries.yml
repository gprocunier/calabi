---
- name: Download OpenShift installer and client binaries for the mirrored
    release
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/cluster/openshift_installer_binaries.yml
  roles:
    - openshift_installer_binaries
