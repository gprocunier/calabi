---
- name: Generate OpenShift agent boot media and attachment plan
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/guests/openshift_cluster_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/cluster/openshift_install_artifacts.yml
    - ../../vars/cluster/openshift_agent_media.yml
  pre_tasks:
    - name: Derive existing OpenShift cluster convergence state
      ansible.builtin.include_tasks: tasks/derive-cluster-convergence.yml

    - name: Skip OpenShift agent media generation when the cluster is already converged
      ansible.builtin.meta: end_play
      when: openshift_cluster_already_converged | default(false) | bool
  roles:
    - openshift_agent_media
