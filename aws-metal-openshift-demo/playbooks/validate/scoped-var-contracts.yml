- name: Validate OpenShift day-2 OIDC scope contracts
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/global/pki.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/cluster/openshift_agent_media.yml
    - ../../vars/guests/openshift_cluster_vm.yml
    - ../../vars/day2/openshift_breakglass_auth.yml
    - ../../vars/day2/openshift_keycloak.yml
    - ../../vars/day2/openshift_oidc_auth.yml
    - ../../vars/day2/openshift_ldap_auth.yml
    - ../../vars/day2/openshift_idm_certs.yml
    - ../../vars/day2/openshift_aap.yml
    - ../../vars/day2/openshift_pipelines.yml
  vars:
    validate_target_playbook: "{{ validate_target_playbook | default('') }}"
    validate_day2_scope: >-
      {{
        validate_target_playbook in [
          '',
          'playbooks/site-lab.yml',
          'playbooks/day2/openshift-post-install.yml',
          'playbooks/day2/openshift-post-install-oidc-auth.yml'
        ]
      }}
  tasks:
    - name: Assert OIDC cross-play contracts render in the day-2 play scope
      ansible.builtin.assert:
        that:
          - openshift_keycloak.route_host | length > 0
          - openshift_oidc_auth.validation.native_test_user | length > 0
          - openshift_oidc_auth.validation.ad_test_user | length > 0
          - openshift_oidc_auth.oauth.claims.groups | length > 0
        fail_msg: >-
          The OpenShift day-2 play scope does not render the OIDC contracts
          cleanly. Check vars_files coverage for AD, IdM, and Keycloak before
          running post-install auth automation.
      when: validate_day2_scope | bool
