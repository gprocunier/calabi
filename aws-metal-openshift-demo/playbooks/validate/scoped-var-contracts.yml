---
- name: Validate bastion staging scope contracts
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/global/name_resolution.yml
  vars:
    validate_target_playbook: "{{ validate_target_playbook | default('') }}"
    validate_bastion_stage_scope: >-
      {{
        validate_target_playbook in [
          '',
          'playbooks/site-lab.yml',
          'playbooks/bootstrap/bastion-stage.yml'
        ]
      }}
  tasks:
    - name: Assert bastion staging name-resolution contracts render in play scope
      ansible.builtin.assert:
        that:
          - lab_name_resolution_bootstrap_hosts | length > 0
          - lab_name_resolution_bootstrap_targets | length > 0
          - >-
            (
              lab_name_resolution_bootstrap_hosts
              | map(attribute='ipv4_address')
              | unique
              | list
              | length
            ) == (lab_name_resolution_bootstrap_hosts | length)
        fail_msg: >-
          Bastion staging does not load enough vars_files to render the managed
          name-resolution contract. Fix the play-local vars scope before relying
          on resolver fallbacks during staging.
      when: validate_bastion_stage_scope | bool

- name: Validate IdM guest scope contracts
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/name_resolution.yml
    - ../../vars/global/lab_switch_ports.yml
  vars:
    validate_target_playbook: "{{ validate_target_playbook | default('') }}"
    validate_idm_scope: >-
      {{
        validate_target_playbook in [
          '',
          'playbooks/site-lab.yml',
          'playbooks/bootstrap/idm.yml'
        ]
      }}
  tasks:
    - name: Assert IdM guest name-resolution contracts render in play scope
      ansible.builtin.assert:
        that:
          - lab_name_resolution_bootstrap_hosts | length > 0
          - lab_name_resolution_bootstrap_targets | length > 0
        fail_msg: >-
          The IdM play scope does not render the managed name-resolution
          contract. A future-phase variable is leaking into bootstrap-time
          resolution data.
      when: validate_idm_scope | bool

