---
- name: Apply standard OpenShift post-install configuration
  hosts: aws_metal
  gather_facts: true
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/global/pki.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/cluster/openshift_agent_media.yml
    - ../../vars/guests/openshift_cluster_vm.yml
    - ../../vars/day2/openshift_breakglass_auth.yml
    - ../../vars/day2/openshift_odf.yml
    - ../../vars/day2/openshift_keycloak.yml
    - ../../vars/day2/openshift_oidc_auth.yml
    - ../../vars/day2/openshift_ldap_auth.yml
    - ../../vars/day2/openshift_idm_certs.yml
    - ../../vars/day2/openshift_aap.yml
    - ../../vars/day2/openshift_pipelines.yml
  vars:
    # Phase ordering is intentional — do not reorder without understanding dependencies:
    #
    #  1. disconnected_operatorhub  — catalog source must exist before any OLM install
    #  2. infra_conversion          — label/taint nodes + OCS tolerations before workloads settle
    #  3. idm_ingress_certs         — establish final TLS state early; routers roll on infra
    #                                 nodes (tolerations in place from phase 2); convergence
    #                                 gate waits for ingress/auth/console COs fully stable
    #                                 and asserts the IdM cert is being served before continuing
    #  4. breakglass_auth           — establish a local recovery login before riskier auth changes
    #  5. nmstate                   — network bridges/VLANs before storage networking and VM networks
    #  6. odf                       — block/file storage layer before anything needing PVCs
    #  7. keycloak                  — deploy the future OIDC provider after storage exists
    #  8. oidc_auth                 — broker cluster auth through Keycloak while breakglass remains
    #  9. ldap_auth                 — group sync / legacy support; can run without owning OAuth
    # 10. virtualization            — requires ODF (live-migration RWX) and NMState (VM networks)
    # 11. pipelines                 — independent operator
    # 12. web_terminal              — independent operator
    # 13. aap                       — heavy; after core infrastructure is stable
    # 14. netobserv                 — Loki can use ODF storage; after storage layer is up
    # 15. validation                — always last
    openshift_post_install_enable_disconnected_operatorhub: true
    openshift_post_install_enable_infra_conversion: true
    openshift_post_install_enable_idm_ingress_certs: true
    openshift_post_install_enable_breakglass_auth: true
    openshift_post_install_enable_ldap_auth: false
    openshift_post_install_enable_nmstate: true
    openshift_post_install_enable_odf: true
    openshift_post_install_enable_keycloak: true
    openshift_post_install_enable_oidc_auth: true
    openshift_post_install_enable_virtualization: true
    openshift_post_install_enable_pipelines: true
    openshift_post_install_enable_web_terminal: true
    openshift_post_install_enable_aap: true
    openshift_post_install_enable_netobserv: true
    openshift_post_install_enable_validation: true
    openshift_post_install_force_disconnected_operatorhub: false
    openshift_post_install_force_infra_conversion: false
    openshift_post_install_force_idm_ingress_certs: false
    openshift_post_install_force_breakglass_auth: false
    openshift_post_install_force_keycloak: false
    openshift_post_install_force_oidc_auth: false
    openshift_post_install_force_ldap_auth: false
    openshift_post_install_force_nmstate: false
    openshift_post_install_force_odf_rebuild: false
    openshift_post_install_force_virtualization: false
    openshift_post_install_force_pipelines: false
    openshift_post_install_force_web_terminal: false
    openshift_post_install_force_aap: false
    openshift_post_install_force_netobserv: false
  tasks:
    - name: Detach agent install media from all cluster VMs (safety net)
      ansible.builtin.include_role:
        name: libvirt_cdrom_cleanup
      vars:
        libvirt_cdrom_cleanup_domain: >-
          {{
            openshift_cluster_node.fqdn
            | default(
              openshift_cluster_node.name
              ~ '.'
              ~ openshift_install_cluster.full_domain
            )
          }}
        libvirt_cdrom_cleanup_media_path: >-
          {{ openshift_agent_media.hypervisor_boot_media_path }}
        libvirt_cdrom_cleanup_reset_boot_to_hd_only: true
        libvirt_cdrom_cleanup_remove_device: false
      loop: "{{ openshift_install_cluster.nodes }}"
      loop_control:
        loop_var: openshift_cluster_node
        label: "{{ openshift_cluster_node.name }}"

    - name: Derive day-2 phase health and reuse decisions
      ansible.builtin.include_tasks: tasks/derive-phase-health.yml

    # Phase 1: catalog source — prerequisite for all OLM-based operator installs
    - name: Apply disconnected OperatorHub pivot when enabled
      ansible.builtin.include_role:
        name: openshift_disconnected_operatorhub
      when:
        - openshift_post_install_enable_disconnected_operatorhub | bool
        - >-
          openshift_post_install_force_disconnected_operatorhub | bool
          or not openshift_post_install_disconnected_operatorhub_healthy | bool

    # Phase 2: node roles — label/taint nodes + add OCS storage tolerations to
    # ingress, monitoring, and registry before any cert or operator changes
    - name: Convert infra nodes when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_infra
      when:
        - openshift_post_install_enable_infra_conversion | bool
        - >-
          openshift_post_install_force_infra_conversion | bool
          or not openshift_post_install_infra_conversion_healthy | bool

    # Phase 3: ingress TLS — establish the desired certificate state early so every
    # subsequent phase deploys into a stable, trusted TLS environment.  The role
    # waits for router rollout, ingress/auth/console COs fully healthy (Available,
    # not Degraded, not Progressing), and asserts the IdM cert is served before
    # returning.  Requires phase 2 tolerations to be in place.
    - name: Apply IdM ingress certificates when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_idm_certs
      when:
        - openshift_post_install_enable_idm_ingress_certs | bool
        - >-
          openshift_post_install_force_idm_ingress_certs | bool
          or not openshift_post_install_idm_ingress_certs_healthy | bool

    # Phase 4: local recovery auth — prove a safe local path before touching network auth
    - name: Apply breakglass authentication when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_breakglass_auth
      when:
        - openshift_post_install_enable_breakglass_auth | bool
        - >-
          openshift_post_install_force_breakglass_auth | bool
          or not openshift_post_install_breakglass_auth_healthy | bool

    # Phase 5: networking — bridges and VLANs before storage networking and VM networks
    - name: Configure Kubernetes NMState when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_nmstate
      when:
        - openshift_post_install_enable_nmstate | bool
        - >-
          openshift_post_install_force_nmstate | bool
          or not openshift_post_install_nmstate_healthy | bool

    # Phase 6: storage — block/file PVCs required by Keycloak, Virtualization, and NetObserv/Loki
    - name: Configure internal ODF day-2 storage when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_odf
      when:
        - openshift_post_install_enable_odf | bool
        - openshift_post_install_odf_effective_mode == 'internal'
        - >-
          openshift_post_install_force_odf_rebuild | bool
          or not openshift_post_install_odf_healthy | bool
      tags:
        - odf
        - odf_internal

    - name: Configure external ODF day-2 storage when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_odf_external
      when:
        - openshift_post_install_enable_odf | bool
        - openshift_post_install_odf_effective_mode == 'external'
        - >-
          openshift_post_install_force_odf_rebuild | bool
          or not openshift_post_install_odf_healthy | bool
      tags:
        - odf
        - odf_external

    # Phase 7: future OIDC provider — deploy after storage exists
    - name: Deploy Keycloak when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_keycloak
      when:
        - openshift_post_install_enable_keycloak | bool
        - >-
          openshift_post_install_force_keycloak | bool
          or not openshift_post_install_keycloak_healthy | bool

    # Phase 8: identity — broker OpenShift OAuth through Keycloak while preserving breakglass
    - name: Apply OIDC authentication when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_oidc_auth
      when:
        - openshift_post_install_enable_oidc_auth | bool
        - >-
          openshift_post_install_force_oidc_auth | bool
          or not openshift_post_install_oidc_auth_healthy | bool

    # Phase 9: identity support — group sync and legacy LDAP support if still desired
    - name: Apply LDAP authentication when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_ldap_auth
      when:
        - openshift_post_install_enable_ldap_auth | bool
        - >-
          openshift_post_install_force_ldap_auth | bool
          or not openshift_post_install_ldap_auth_healthy | bool

    # Phase 10: virtualization — depends on ODF (live-migration RWX) and NMState (VM networks)
    - name: Configure OpenShift Virtualization when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_virtualization
      when:
        - openshift_post_install_enable_virtualization | bool
        - >-
          openshift_post_install_force_virtualization | bool
          or not openshift_post_install_virtualization_healthy | bool

    # Phase 11: pipelines — independent operator
    - name: Configure OpenShift Pipelines when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_pipelines
      when:
        - openshift_post_install_enable_pipelines | bool
        - >-
          openshift_post_install_force_pipelines | bool
          or not openshift_post_install_pipelines_healthy | bool

    # Phase 12: web terminal — independent operator
    - name: Configure Web Terminal when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_web_terminal
      when:
        - openshift_post_install_enable_web_terminal | bool
        - >-
          openshift_post_install_force_web_terminal | bool
          or not openshift_post_install_web_terminal_healthy | bool

    # Phase 13: AAP — heavy; after core infrastructure is stable
    - name: Configure Ansible Automation Platform when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_aap
      when:
        - openshift_post_install_enable_aap | bool
        - >-
          openshift_post_install_force_aap | bool
          or not openshift_post_install_aap_healthy | bool

    # Phase 14: network observability — Loki storage benefits from ODF being up first
    - name: Configure Network Observability when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_netobserv
      when:
        - openshift_post_install_enable_netobserv | bool
        - >-
          openshift_post_install_force_netobserv | bool
          or not openshift_post_install_netobserv_healthy | bool

    # Phase 15: validation — always last
    - name: Validate post-install state when enabled
      ansible.builtin.include_role:
        name: openshift_post_install_validate
      when: openshift_post_install_enable_validation | bool
