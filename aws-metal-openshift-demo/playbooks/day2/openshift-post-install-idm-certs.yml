---
- name: Configure OpenShift ingress to use an IdM-issued certificate
  hosts: aws_metal
  gather_facts: true
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/day2/openshift_idm_certs.yml
  roles:
    - role: openshift_post_install_idm_certs
