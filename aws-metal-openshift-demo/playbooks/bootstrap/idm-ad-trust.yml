---
- name: Probe whether the optional IdM AD trust path is already fully converged
  hosts: aws_metal
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_group_policy.yml
    - ../../vars/global/ad_integration.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml

  pre_tasks:
    - name: Skip IdM AD trust convergence probing when disabled
      ansible.builtin.meta: end_play
      when:
        - not (idm_ad_trust.enabled | bool)
          or not (lab_build_ad_server | bool)

  tasks:
    - name: Wait briefly for SSH on an existing IdM guest before trust probing
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 22
        timeout: 20
        sleep: 5
      register: idm_ad_trust_probe_idm_ssh
      changed_when: false
      failed_when: false

    - name: Wait briefly for WinRM on an existing AD guest before trust probing
      ansible.builtin.wait_for:
        host: "{{ ad_vm.network.ipv4_address }}"
        port: "{{ ad_server_winrm_port | default(5985) }}"
        timeout: 20
        sleep: 5
      register: idm_ad_trust_probe_ad_winrm
      changed_when: false
      failed_when: false

    - name: Register the IdM guest for AD trust completion probing
      ansible.builtin.add_host:
        name: idm_ad_trust_probe
        groups:
          - idm_ad_trust_probe
        ansible_host: "{{ idm_vm.network.ipv4_address }}"
        ansible_user: "{{ idm_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ hostvars[inventory_hostname].ansible_ssh_private_key_file }}
        ansible_become: true
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
      when: (idm_ad_trust_probe_idm_ssh.state | default('')) == 'started'

    - name: Register the AD guest for trust completion probing
      ansible.builtin.add_host:
        name: idm_ad_trust_ad_probe
        groups:
          - idm_ad_trust_ad_probe
        ansible_host: "{{ ad_vm.network.ipv4_address }}"
        ansible_user: "{{ ad_vm.access.admin_user }}"
        ansible_password: "{{ ad_vm.access.admin_password }}"
        ansible_connection: ansible.builtin.winrm
        ansible_port: 5985
        ansible_winrm_transport: basic
        ansible_winrm_server_cert_validation: ignore
      when: (idm_ad_trust_probe_ad_winrm.state | default('')) == 'started'

- name: Check whether the AD guest already has the expected IdM conditional forwarder
  hosts: idm_ad_trust_ad_probe
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_group_policy.yml
    - ../../vars/global/ad_integration.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml

  tasks:
    - name: Wait for authenticated WinRM connectivity to the AD guest for trust probing
      ansible.builtin.wait_for_connection:
        timeout: 60
        sleep: 10
        connect_timeout: 10

    - name: Probe the AD conditional forwarder completion state
      ansible.windows.win_powershell:
        script: |
          $zoneName = "{{ idm_vm.domain }}"
          $expectedMaster = "{{ idm_vm.network.ipv4_address }}"
          $expectedHost = "{{ idm_vm.name }}.{{ idm_vm.domain }}"

          $zone = Get-DnsServerZone -Name $zoneName -ErrorAction SilentlyContinue
          if ($null -eq $zone -or $zone.ZoneType -ne 'Forwarder') {
            [pscustomobject]@{
              completed = $false
              reasons = @('conditional-forwarder')
            } | ConvertTo-Json -Compress
            return
          }

          $masters = @((Get-DnsServerConditionalForwarderZone -Name $zoneName).MasterServers |
            ForEach-Object { $_.IPAddressToString })
          if ($masters -notcontains $expectedMaster) {
            [pscustomobject]@{
              completed = $false
              reasons = @('conditional-forwarder-master')
            } | ConvertTo-Json -Compress
            return
          }

          try {
            Resolve-DnsName -Name $expectedHost -Server 127.0.0.1 -Type A | Out-Null
          } catch {
            [pscustomobject]@{
              completed = $false
              reasons = @('conditional-forwarder-resolution')
            } | ConvertTo-Json -Compress
            return
          }

          [pscustomobject]@{
            completed = $true
            reasons = @('ad trust forwarder already converged')
          } | ConvertTo-Json -Compress
      register: idm_ad_trust_ad_probe_completion
      changed_when: false

    - name: Record whether the AD conditional forwarder is already converged
      ansible.builtin.group_by:
        key: >-
          idm_ad_trust_forwarder_complete_{{
            (
              (idm_ad_trust_ad_probe_completion.output | first) | from_json
            ).completed | ternary('true', 'false')
          }}

    - name: Publish the AD trust forwarder completion probe result
      ansible.builtin.debug:
        msg: "{{ (idm_ad_trust_ad_probe_completion.output | first) | from_json }}"

- name: Check whether the IdM guest already has the expected AD trust state
  hosts: idm_ad_trust_probe
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_group_policy.yml
    - ../../vars/global/ad_integration.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml

  tasks:
    - name: Wait for authenticated SSH connectivity to the IdM guest for trust probing
      ansible.builtin.wait_for_connection:
        timeout: 60
        sleep: 10
        connect_timeout: 10

    - name: Probe the IdM AD trust completion state
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          reasons=()

          if ! printf '%s\n' {{ idm_server.admin_password | quote }} | kinit admin >/dev/null 2>&1; then
            reasons+=("kinit-admin")
          else
            if ! ipa trust-show {{ idm_ad_trust.ad_domain | quote }} >/dev/null 2>&1; then
              reasons+=("ipa-trust")
            fi

            if ! ipa dnsforwardzone-show {{ idm_ad_trust.ad_domain | quote }} >/dev/null 2>&1; then
              reasons+=("ipa-forward-zone")
            fi

            if ! sssctl domain-list 2>/dev/null | grep -Fx {{ idm_ad_trust.ad_domain | quote }} >/dev/null 2>&1; then
              reasons+=("sssd-domain")
            fi

            {% set _idm_ad_trust_policy_mappings = (ad_group_policy.mappings | default([])) if (ad_group_policy.enabled | default(false) | bool) else [] %}
            {% for mapping in _idm_ad_trust_policy_mappings %}
            if ! ipa group-show {{ mapping.idm_external_group | quote }} --all 2>/dev/null | grep -F ipaexternalgroup >/dev/null 2>&1; then
              reasons+=("external-group:{{ mapping.idm_external_group }}")
            fi

            if ! ipa group-show {{ mapping.idm_local_group | quote }} --all 2>/dev/null | grep -F {{ mapping.idm_external_group | quote }} >/dev/null 2>&1; then
              reasons+=("local-group-nesting:{{ mapping.idm_local_group }}")
            fi
            {% endfor %}

            kdestroy >/dev/null 2>&1 || true
          fi

          if [ "${reasons[0]+set}" != "set" ]; then
            printf 'idm ad trust already converged\n'
            exit 0
          fi

          printf '%s\n' "${reasons[@]}"
          exit 1
      args:
        executable: /bin/bash
      register: idm_ad_trust_probe_completion
      changed_when: false
      failed_when: false
      no_log: true

    - name: Record whether the IdM AD trust is already converged
      ansible.builtin.group_by:
        key: >-
          idm_ad_trust_complete_{{
            (idm_ad_trust_probe_completion.rc == 0) | ternary('true', 'false')
          }}

    - name: Publish the IdM AD trust completion probe result
      ansible.builtin.debug:
        msg:
          completed: "{{ idm_ad_trust_probe_completion.rc == 0 }}"
          checks: "{{ idm_ad_trust_probe_completion.stdout_lines | default([]) }}"

- name: Register the IDM guest for optional AD trust configuration
  hosts: aws_metal
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_group_policy.yml
    - ../../vars/global/ad_integration.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml

  pre_tasks:
    - name: Skip IdM AD trust configuration when disabled
      ansible.builtin.meta: end_play
      when: not (idm_ad_trust.enabled | bool)

    - name: Skip IdM AD trust registration when trust is already fully converged
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_ad_trust_complete_true'] | default([])) | length > 0
        - (groups['idm_ad_trust_forwarder_complete_true'] | default([])) | length > 0

  tasks:
    - name: Require the AD server when IdM AD trust is enabled
      ansible.builtin.assert:
        that:
          - lab_build_ad_server | bool
        fail_msg: >-
          IdM AD trust requires lab_build_ad_server=true so the AD domain
          exists before trust configuration runs.

    - name: Register the IDM guest as a temporary Ansible host
      ansible.builtin.add_host:
        name: "{{ idm_vm.name }}.{{ idm_vm.domain }}"
        groups:
          - idm_guest
        ansible_host: "{{ idm_vm.network.ipv4_address }}"
        ansible_user: "{{ idm_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ hostvars[inventory_hostname].ansible_ssh_private_key_file }}
        ansible_become: true
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

    - name: Register the AD guest as a temporary WinRM host
      ansible.builtin.add_host:
        name: ad-trust-guest
        groups:
          - ad_trust_servers
        ansible_host: "{{ ad_vm.network.ipv4_address }}"
        ansible_user: "{{ ad_vm.access.admin_user }}"
        ansible_password: "{{ ad_vm.access.admin_password }}"
        ansible_connection: ansible.builtin.winrm
        ansible_port: 5985
        ansible_winrm_transport: basic
        ansible_winrm_server_cert_validation: ignore

- name: Configure the AD conditional forwarder for the IdM domain
  hosts: ad_trust_servers
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_group_policy.yml
    - ../../vars/global/ad_integration.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml

  pre_tasks:
    - name: Skip AD conditional forwarder reconciliation when AD trust is already fully converged
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_ad_trust_complete_true'] | default([])) | length > 0
        - (groups['idm_ad_trust_forwarder_complete_true'] | default([])) | length > 0

    - name: Wait for authenticated WinRM connectivity to the AD guest
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 15
        connect_timeout: 10

    - name: Verify WinRM connectivity to the AD guest
      ansible.windows.win_ping:

  tasks:
    - name: Ensure the AD DNS conditional forwarder exists for the IdM domain
      ansible.windows.win_powershell:
        script: |
          $zoneName = "{{ idm_vm.domain }}"
          $masterServers = @("{{ idm_vm.network.ipv4_address }}")
          $existing = Get-DnsServerZone -Name $zoneName -ErrorAction SilentlyContinue

          if ($null -eq $existing) {
            Add-DnsServerConditionalForwarderZone `
              -Name $zoneName `
              -MasterServers $masterServers `
              -ReplicationScope Forest
            Write-Output "CHANGED"
            return
          }

          if ($existing.ZoneType -ne 'Forwarder') {
            throw "DNS zone $zoneName exists but is not a conditional forwarder."
          }

          $current = @(Get-DnsServerConditionalForwarderZone -Name $zoneName).MasterServers |
            ForEach-Object { $_.IPAddressToString }
          $expected = $masterServers | Sort-Object
          $actual = $current | Sort-Object

          if (Compare-Object -ReferenceObject $expected -DifferenceObject $actual) {
            Set-DnsServerConditionalForwarderZone -Name $zoneName -MasterServers $masterServers
            Write-Output "CHANGED"
            return
          }

          Write-Output "OK"
      register: ad_trust_idm_forwarder
      changed_when: "'CHANGED' in ad_trust_idm_forwarder.output"

    - name: Validate that AD resolves the IdM host through the conditional forwarder
      ansible.windows.win_powershell:
        script: |
          Resolve-DnsName -Name "{{ idm_vm.name }}.{{ idm_vm.domain }}" -Server 127.0.0.1 -Type A | Out-Null
          Write-Output "OK"
      changed_when: false

- name: Configure optional AD trust on the IDM guest
  hosts: idm_guest
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/global/ad_group_policy.yml
    - ../../vars/global/ad_integration.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/guests/idm_vm.yml

  pre_tasks:
    - name: Skip optional AD trust on the IDM guest when AD trust is disabled
      ansible.builtin.meta: end_play
      when:
        - not (idm_ad_trust.enabled | bool)
          or not (lab_build_ad_server | bool)

    - name: Skip IdM AD trust reconciliation when trust is already fully converged
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_ad_trust_complete_true'] | default([])) | length > 0
        - (groups['idm_ad_trust_forwarder_complete_true'] | default([])) | length > 0

    - name: Derive the hypervisor delegate host for IDM reachability checks
      ansible.builtin.set_fact:
        idm_ad_trust_delegate_host: >-
          {{ (groups['aws_metal'] | default([])) | first | default('') }}

    - name: Validate the hypervisor delegate host is available
      ansible.builtin.assert:
        that:
          - idm_ad_trust_delegate_host | length > 0
        fail_msg: >-
          IDM AD trust guest configuration requires an aws_metal hypervisor
          inventory host so the controller can reach the guest network.

    - name: Wait for the IDM guest SSH port from the hypervisor network
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 22
        timeout: 900
        sleep: 10
      delegate_to: "{{ idm_ad_trust_delegate_host }}"
      become: false

    - name: Wait for the IDM guest to accept SSH connections
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Gather IDM guest facts after SSH is available
      ansible.builtin.setup:

  roles:
    - role: idm_ad_trust
