---
- name: Probe whether an existing IDM guest is already fully converged
  hosts: aws_metal
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/name_resolution.yml
    - ../../vars/global/lab_switch_ports.yml

  tasks:
    - name: Check whether the IDM libvirt domain already exists
      ansible.builtin.command:
        argv:
          - virsh
          - dominfo
          - "{{ idm_vm.name }}.{{ idm_vm.domain }}"
      register: idm_probe_domain_info
      changed_when: false
      failed_when: false

    - name: Wait briefly for SSH on an existing IDM guest
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 22
        timeout: 20
        sleep: 5
      register: idm_probe_ssh
      changed_when: false
      failed_when: false
      when:
        - idm_probe_domain_info.rc == 0
        - not (idm_vm.provisioning.recreate_domain | bool)
        - not (idm_vm.provisioning.rebuild_disk_from_image | bool)

    - name: Register the existing IDM guest for completion probing
      ansible.builtin.add_host:
        name: idm_probe
        groups:
          - idm_probe
        ansible_host: "{{ idm_vm.network.ipv4_address }}"
        ansible_user: "{{ idm_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ hostvars[inventory_hostname].ansible_ssh_private_key_file }}
        ansible_become: true
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o ProxyCommand="ssh -i {{
          hostvars[inventory_hostname].ansible_ssh_private_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          {{ hostvars[inventory_hostname].ansible_user }}@{{
          hostvars[inventory_hostname].ansible_host }} -W %h:%p"
      when:
        - idm_probe_domain_info.rc == 0
        - (idm_probe_ssh.state | default('')) == 'started'
        - not (idm_vm.provisioning.recreate_domain | bool)
        - not (idm_vm.provisioning.rebuild_disk_from_image | bool)

- name: Check whether the existing IDM guest is already fully configured
  hosts: idm_probe
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/name_resolution.yml
    - ../../vars/global/lab_switch_ports.yml

  tasks:
    - name: Wait for authenticated SSH connectivity to the existing IDM guest
      ansible.builtin.wait_for_connection:
        timeout: 60
        sleep: 10
        connect_timeout: 10

    - name: Probe the IDM guest completion state
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          reasons=()

          if ! ipactl status >/dev/null 2>&1; then
            reasons+=("ipactl")
          fi

          if ! systemctl is-enabled --quiet firewalld || ! systemctl is-active --quiet firewalld; then
            reasons+=("firewalld")
          fi

          if ! systemctl is-enabled --quiet oddjobd.service || ! systemctl is-active --quiet oddjobd.service; then
            reasons+=("oddjobd")
          fi

          if ! systemctl is-enabled --quiet cockpit.socket || ! systemctl is-active --quiet cockpit.socket; then
            reasons+=("cockpit.socket")
          fi

          if [ ! -r /etc/ipa/default.conf ]; then
            reasons+=("ipa-default-conf")
          fi

          if [ ! -r /etc/ipa/ca.crt ]; then
            reasons+=("ipa-ca")
          fi

          if [ ! -f /var/lib/calabi-shell/installed-revision ] || [ ! -f /etc/profile.d/calabi-shell.sh ]; then
            reasons+=("calabi-shell")
          fi

          if [ ! -d /var/log/journal ]; then
            reasons+=("persistent-journal")
          fi

          if [ -r /etc/ipa/default.conf ]; then
            if printf '%s\n' {{ idm_server.admin_password | quote }} | kinit admin >/dev/null 2>&1; then
              if ! ipa dnszone-show {{ idm_vm.domain | quote }} >/dev/null 2>&1; then
                reasons+=("dnszone:{{ idm_vm.domain }}")
              fi

              {% for group in idm_server.identity_groups %}
              if ! ipa group-show {{ group | quote }} >/dev/null 2>&1; then
                reasons+=("group:{{ group }}")
              fi
              {% endfor %}

              {% for user in idm_server.identity_users %}
              if ! ipa user-show {{ user.name | quote }} >/dev/null 2>&1; then
                reasons+=("user:{{ user.name }}")
              fi
              {% endfor %}

              if ! dig +short @{{ idm_vm.network.ipv4_address }} {{ bastion_vm.name }}.{{ bastion_vm.domain }} A | grep -Fx {{ bastion_vm.network.ipv4_address | regex_replace('/.*$', '') | quote }} >/dev/null 2>&1; then
                reasons+=("dns-a:{{ bastion_vm.name }}.{{ bastion_vm.domain }}")
              fi

              kdestroy >/dev/null 2>&1 || true
            else
              reasons+=("kinit-admin")
            fi
          fi

          if [ "${reasons[0]+set}" != "set" ]; then
            printf 'idm guest already converged\n'
            exit 0
          fi

          printf '%s\n' "${reasons[@]}"
          exit 1
      args:
        executable: /bin/bash
      register: idm_probe_completion
      changed_when: false
      failed_when: false
      no_log: true

    - name: Record whether the existing IDM guest is already converged
      ansible.builtin.group_by:
        key: >-
          idm_bootstrap_complete_{{
            (idm_probe_completion.rc == 0) | ternary('true', 'false')
          }}

    - name: Publish the IDM guest completion probe result
      ansible.builtin.debug:
        msg:
          completed: "{{ idm_probe_completion.rc == 0 }}"
          checks: "{{ idm_probe_completion.stdout_lines | default([]) }}"

- name: Build the IDM virtual machine for the OpenShift demo
  hosts: aws_metal
  become: true
  gather_facts: true
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/name_resolution.yml
    - ../../vars/global/lab_switch_ports.yml

  pre_tasks:
    - name: Skip IDM VM build when the existing guest is already fully configured
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_bootstrap_complete_true'] | default([])) | length > 0
        - not (idm_vm.provisioning.recreate_domain | bool)
        - not (idm_vm.provisioning.rebuild_disk_from_image | bool)

  roles:
    - role: idm

  tasks:
    - name: Register the IDM guest as a temporary Ansible host
      ansible.builtin.add_host:
        name: "{{ idm_role_vm_fqdn }}"
        groups:
          - idm_guest
        ansible_host: "{{ idm_vm.network.ipv4_address }}"
        ansible_user: "{{ idm_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ hostvars[inventory_hostname].ansible_ssh_private_key_file }}
        ansible_become: true
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o ProxyCommand="ssh -i {{
          hostvars[inventory_hostname].ansible_ssh_private_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          {{ hostvars[inventory_hostname].ansible_user }}@{{
          hostvars[inventory_hostname].ansible_host }} -W %h:%p"
    - name: Require the AD server when AD-root PKI mode is selected
      ansible.builtin.assert:
        that:
          - lab_build_ad_server | bool
        fail_msg: >-
          lab_pki_mode=ad-root-idm-intermediate requires lab_build_ad_server=true
          so the AD DS and AD CS root CA are available before IdM installation.
      when: lab_pki_mode == 'ad-root-idm-intermediate'

    - name: Register the AD CS guest as a temporary Ansible host
      ansible.builtin.add_host:
        name: adcs_ca
        groups:
          - adcs_ca
        ansible_host: "{{ ad_vm.network.ipv4_address }}"
        ansible_user: "{{ ad_vm.access.admin_user }}"
        ansible_password: "{{ ad_vm.access.admin_password }}"
        ansible_connection: ansible.builtin.winrm
        ansible_port: 5985
        ansible_winrm_transport: basic
        ansible_winrm_server_cert_validation: ignore
      when: lab_pki_mode == 'ad-root-idm-intermediate'

- name: Configure the IDM guest
  hosts: idm_guest
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/name_resolution.yml
    - ../../vars/global/lab_switch_ports.yml

  pre_tasks:
    - name: Skip IDM guest configuration when the guest is already fully configured
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_bootstrap_complete_true'] | default([])) | length > 0
        - not (idm_vm.provisioning.recreate_domain | bool)
        - not (idm_vm.provisioning.rebuild_disk_from_image | bool)

    - name: Derive the hypervisor delegate host for IDM reachability checks
      ansible.builtin.set_fact:
        idm_guest_delegate_host: >-
          {{ (groups['aws_metal'] | default([])) | first | default('') }}

    - name: Validate the hypervisor delegate host is available
      ansible.builtin.assert:
        that:
          - idm_guest_delegate_host | length > 0
        fail_msg: >-
          IDM guest configuration requires an aws_metal hypervisor inventory
          host so the controller can reach the guest network.

    - name: Wait for the IDM guest SSH port from the hypervisor network
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 22
        timeout: 900
        sleep: 10
      delegate_to: "{{ idm_guest_delegate_host }}"
      become: false

    - name: Reset any cached SSH state before connecting to the IDM guest
      ansible.builtin.meta: reset_connection

    - name: Wait for the IDM guest to accept SSH connections
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Gather IDM guest facts after SSH is available
      ansible.builtin.setup:

  roles:
    - role: idm_guest
    - role: lab_name_resolution

- name: Detach IDM cloud-init media after guest configuration
  hosts: aws_metal
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/guests/idm_vm.yml
  pre_tasks:
    - name: Skip IDM media cleanup when the guest is already fully configured
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_bootstrap_complete_true'] | default([])) | length > 0
        - not (idm_vm.provisioning.recreate_domain | bool)
        - not (idm_vm.provisioning.rebuild_disk_from_image | bool)
  roles:
    - role: libvirt_cdrom_cleanup
      vars:
        libvirt_cdrom_cleanup_domain: >-
          {{ idm_vm.name }}.{{ idm_vm.domain }}
        libvirt_cdrom_cleanup_media_path: >-
          {{
            idm_runtime_root
            | default('/var/lib/aws-metal-openshift-demo')
          }}/{{ idm_vm.name }}/{{ idm_vm.name }}-cidata.iso
        libvirt_cdrom_cleanup_remove_media_file: true
        libvirt_cdrom_cleanup_reset_boot_to_hd_only: true

- name: Prefer authoritative IdM DNS on the hypervisor uplink
  hosts: aws_metal
  become: true
  gather_facts: true
  vars_files:
    - ../../vars/guests/idm_vm.yml
  pre_tasks:
    - name: Skip hypervisor IdM DNS preference when the guest is already fully configured
      ansible.builtin.meta: end_play
      when:
        - (groups['idm_bootstrap_complete_true'] | default([])) | length > 0
        - not (idm_vm.provisioning.recreate_domain | bool)
        - not (idm_vm.provisioning.rebuild_disk_from_image | bool)

  tasks:
    - name: Determine the active NetworkManager connection for the hypervisor uplink
      ansible.builtin.command:
        argv:
          - nmcli
          - -t
          - -f
          - NAME,DEVICE
          - connection
          - show
          - --active
      register: idm_hypervisor_active_connections
      changed_when: false

    - name: Store the active hypervisor uplink connection name
      ansible.builtin.set_fact:
        idm_hypervisor_uplink_connection_name: >-
          {{
            (
              idm_hypervisor_active_connections.stdout_lines
              | select('search', ':' ~ ansible_default_ipv4.interface ~ '$')
              | map('split', ':')
              | map('first')
              | list
              | first
            ) | default('')
          }}

    - name: Wait for authoritative IdM DNS on the management network
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 53
        timeout: 120
        connect_timeout: 1
        sleep: 2
      changed_when: false
      when: idm_hypervisor_uplink_connection_name | length > 0

    - name: Configure the hypervisor uplink to use IdM DNS first
      ansible.builtin.command:
        argv:
          - nmcli
          - connection
          - modify
          - "{{ idm_hypervisor_uplink_connection_name }}"
          - ipv4.dns
          - >-
            {{ ([idm_vm.network.ipv4_address] + (idm_vm.network.dns_servers
            | default([]))) | join(' ') }}
          - ipv4.ignore-auto-dns
          - "yes"
      changed_when: true
      when: idm_hypervisor_uplink_connection_name | length > 0

    - name: Reapply the hypervisor uplink connection after IdM DNS changes
      ansible.builtin.command:
        argv:
          - nmcli
          - connection
          - up
          - "{{ idm_hypervisor_uplink_connection_name }}"
      changed_when: true
      when: idm_hypervisor_uplink_connection_name | length > 0
