---
- name: Build the IDM virtual machine for the OpenShift demo
  hosts: aws_metal
  become: true
  gather_facts: true
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/global/lab_switch_ports.yml

  roles:
    - role: idm

  tasks:
    - name: Register the IDM guest as a temporary Ansible host
      ansible.builtin.add_host:
        name: "{{ idm_role_vm_fqdn }}"
        groups:
          - idm_guest
        ansible_host: "{{ idm_vm.network.ipv4_address }}"
        ansible_user: "{{ idm_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ hostvars[inventory_hostname].ansible_ssh_private_key_file }}
        ansible_become: true
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o ProxyCommand="ssh -i {{
          hostvars[inventory_hostname].ansible_ssh_private_key_file }}
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          {{ hostvars[inventory_hostname].ansible_user }}@{{
          hostvars[inventory_hostname].ansible_host }} -W %h:%p"
    - name: Require the AD server when AD-root PKI mode is selected
      ansible.builtin.assert:
        that:
          - lab_build_ad_server | bool
        fail_msg: >-
          lab_pki_mode=ad-root-idm-intermediate requires lab_build_ad_server=true
          so the AD DS and AD CS root CA are available before IdM installation.
      when: lab_pki_mode == 'ad-root-idm-intermediate'

    - name: Register the AD CS guest as a temporary Ansible host
      ansible.builtin.add_host:
        name: adcs_ca
        groups:
          - adcs_ca
        ansible_host: "{{ ad_vm.network.ipv4_address }}"
        ansible_user: "{{ ad_vm.access.admin_user }}"
        ansible_password: "{{ ad_vm.access.admin_password }}"
        ansible_connection: ansible.builtin.winrm
        ansible_port: 5985
        ansible_winrm_transport: basic
        ansible_winrm_server_cert_validation: ignore
      when: lab_pki_mode == 'ad-root-idm-intermediate'

- name: Configure the IDM guest
  hosts: idm_guest
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/pki.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/global/ad_server.yml
    - ../../vars/guests/ad_vm.yml
    - ../../vars/global/lab_switch_ports.yml

  pre_tasks:
    - name: Wait for the IDM guest SSH port from the hypervisor network
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 22
        timeout: 900
        sleep: 10
      delegate_to: "{{ groups['aws_metal'] | first }}"
      become: false

    - name: Reset any cached SSH state before connecting to the IDM guest
      ansible.builtin.meta: reset_connection

    - name: Wait for the IDM guest to accept SSH connections
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Gather IDM guest facts after SSH is available
      ansible.builtin.setup:

  roles:
    - role: idm_guest

- name: Detach IDM cloud-init media after guest configuration
  hosts: aws_metal
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/pki.yml
    - ../../vars/guests/idm_vm.yml
  roles:
    - role: libvirt_cdrom_cleanup
      vars:
        libvirt_cdrom_cleanup_domain: >-
          {{ idm_vm.name }}.{{ idm_vm.domain }}
        libvirt_cdrom_cleanup_media_path: >-
          {{
            idm_runtime_root
            | default('/var/lib/aws-metal-openshift-demo')
          }}/{{ idm_vm.name }}/{{ idm_vm.name }}-cidata.iso
        libvirt_cdrom_cleanup_remove_media_file: true
        libvirt_cdrom_cleanup_reset_boot_to_hd_only: true
