---
- name: Stage the project and lab execution inputs onto the bastion
  hosts: aws_metal
  become: false
  gather_facts: false
  vars:
    bastion_stage_project_lab_credentials_path: >-
      {{ lab_execution_project_root }}/inventory/group_vars/all/lab_credentials.yml
    bastion_stage_manager_lab_credentials_path: >-
      {{ lookup('env', 'HOME') }}/.local/state/calabi-manager/secrets/lab_credentials.yml
  vars_files:
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/name_resolution.yml

  pre_tasks:
    - name: Load optional project-local lab credentials for bastion bootstrap
      ansible.builtin.set_fact:
        bastion_stage_bootstrap_project_lab_credentials: >-
          {{
            (
              lookup(
                'file',
                bastion_stage_project_lab_credentials_path,
                errors='ignore'
              )
              | default('', true)
              | trim
            ) | from_yaml
          }}
      when:
        - >-
          (
            lookup(
              'file',
              bastion_stage_project_lab_credentials_path,
              errors='ignore'
            )
            | default('', true)
            | trim
          ) | length > 0

    - name: Load optional calabi-manager lab credentials for bastion bootstrap
      ansible.builtin.set_fact:
        bastion_stage_bootstrap_manager_lab_credentials: >-
          {{
            (
              lookup(
                'file',
                bastion_stage_manager_lab_credentials_path,
                errors='ignore'
              )
              | default('', true)
              | trim
            ) | from_yaml
          }}
      when:
        - >-
          (
            lookup(
              'file',
              bastion_stage_manager_lab_credentials_path,
              errors='ignore'
            )
            | default('', true)
            | trim
          ) | length > 0

    - name: Derive the bootstrap lab default password for bastion staging
      ansible.builtin.set_fact:
        lab_default_password: >-
          {{
            lab_default_password
            | default(
              bastion_stage_bootstrap_project_lab_credentials.lab_default_password
              | default(
                bastion_stage_bootstrap_manager_lab_credentials.lab_default_password
                | default('', true),
                true
              ),
              true
            )
          }}

    - name: Register the bastion host as a temporary Ansible host
      ansible.builtin.add_host:
        name: bastion_stage_target
        groups:
          - bastion_stage_hosts
        ansible_host: "{{ bastion_vm.network.ipv4_address }}"
        ansible_user: "{{ bastion_vm.access.admin_user }}"
        ansible_ssh_private_key_file: >-
          {{ bastion_client.controller_ssh_private_key_file }}
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -o ProxyCommand="ssh -i {{ hostvars[inventory_hostname].ansible_ssh_private_key_file }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{ hostvars[inventory_hostname].ansible_user }}@{{ hostvars[inventory_hostname].ansible_host }} -W %h:%p"

    - name: Wait for the bastion guest to accept SSH connections
      ansible.builtin.wait_for:
        host: "{{ bastion_vm.network.ipv4_address }}"
        port: 22
        timeout: 900
        sleep: 10

- name: Prepare the bastion as the lab execution host
  hosts: bastion_stage_hosts
  become: true
  gather_facts: true
  vars_files:
    - ../../vars/guests/bastion_vm.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/guests/mirror_registry_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/global/name_resolution.yml
  roles:
    - role: bastion_stage
    - role: lab_name_resolution
