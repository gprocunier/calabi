- name: Remove stale OpenShift cluster artifacts from the bastion
  hosts: aws_metal
  become: false
  gather_facts: false
  vars_files:
    - ../../vars/guests/bastion_vm.yml
  vars:
    cleanup_scope_all: >-
      {{
        not (
          cleanup_destroy_ad_server | default(false) | bool or
          cleanup_destroy_idm | default(false) | bool or
          cleanup_destroy_mirror_registry | default(false) | bool or
          cleanup_destroy_bastion | default(false) | bool or
          cleanup_destroy_openshift_cluster | default(false) | bool or
          cleanup_destroy_idm_certs | default(false) | bool or
          cleanup_destroy_lab_networking | default(false) | bool
        )
      }}
    cleanup_bastion_local_ssh_key: >-
      {{
        (bastion_client.secrets_root ~ '/id_ed25519')
        if lookup('env', 'USER') == bastion_vm.access.admin_user
        else bastion_client.controller_ssh_private_key_file
      }}
    cleanup_bastion_proxy_command: >-
      {{
        ''
        if lookup('env', 'USER') == bastion_vm.access.admin_user
        else
        '-o ProxyCommand="ssh -i '
        ~ hostvars[inventory_hostname].ansible_ssh_private_key_file
        ~ ' -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null '
        ~ hostvars[inventory_hostname].ansible_user
        ~ '@'
        ~ hostvars[inventory_hostname].ansible_host
        ~ ' -W %h:%p"'
      }}
  tasks:
    - name: Check whether the bastion libvirt domain exists
      ansible.builtin.command:
        argv:
          - virsh
          - dominfo
          - "{{ bastion_vm.name }}.{{ bastion_vm.domain }}"
      become: true
      register: cleanup_bastion_domain_info
      changed_when: false
      failed_when: false
      when:
        - cleanup_scope_all or (cleanup_destroy_openshift_cluster | default(false) | bool)
        - not (cleanup_destroy_bastion | default(false) | bool)

    - name: Remove stale tracked-run state files from the bastion
      ansible.builtin.shell: |
        set -euo pipefail
        ssh \
          -i {{ cleanup_bastion_local_ssh_key | quote }} \
          -o BatchMode=yes \
          -o IdentitiesOnly=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          {{ cleanup_bastion_proxy_command }} \
          {{ bastion_vm.access.admin_user }}@{{ bastion_vm.network.ipv4_address }} \
          "sudo bash -lc 'if [ -d /var/tmp/bastion-playbooks ]; then find /var/tmp/bastion-playbooks -maxdepth 1 -type f \\( -name \"*.pid\" -o -name \"*.rc\" -o -name \"*.log\" -o -name \"*.runner.sh\" \\) -delete; fi'"
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: cleanup_bastion_tracked_state_cleanup
      changed_when: false
      retries: 12
      delay: 5
      until: cleanup_bastion_tracked_state_cleanup.rc == 0
      when:
        - (cleanup_bastion_domain_info.rc | default(1)) == 0

    - name: Remove the generated OpenShift cluster artifact root from the bastion
      ansible.builtin.shell: |
        set -euo pipefail
        ssh \
          -i {{ cleanup_bastion_local_ssh_key | quote }} \
          -o BatchMode=yes \
          -o IdentitiesOnly=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          {{ cleanup_bastion_proxy_command }} \
          {{ bastion_vm.access.admin_user }}@{{ bastion_vm.network.ipv4_address }} \
          "sudo rm -rf {{ bastion_client.cluster_artifact_root | quote }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: true
      when:
        - (cleanup_bastion_domain_info.rc | default(1)) == 0

    - name: Recreate the clean OpenShift cluster artifact directories on the bastion
      ansible.builtin.shell: |
        set -euo pipefail
        ssh \
          -i {{ cleanup_bastion_local_ssh_key | quote }} \
          -o BatchMode=yes \
          -o IdentitiesOnly=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          {{ cleanup_bastion_proxy_command }} \
          {{ bastion_vm.access.admin_user }}@{{ bastion_vm.network.ipv4_address }} \
          "sudo install -d -o {{ bastion_vm.access.admin_user }} -g {{ bastion_vm.access.admin_user }} -m 0755 {{ bastion_client.cluster_artifact_root | quote }} {{ (bastion_client.cluster_artifact_root ~ '/auth') | quote }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: true
      when:
        - (cleanup_bastion_domain_info.rc | default(1)) == 0

- name: Remove OpenShift IdM certificate configuration
  hosts: aws_metal
  become: true
  gather_facts: "{{ cleanup_scope_all or (cleanup_destroy_idm_certs | default(false) | bool) }}"
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/global/mirror_content.yml
    - ../../vars/global/lab_switch_ports.yml
    - ../../vars/guests/idm_vm.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/day2/openshift_idm_certs.yml
  vars:
    cleanup_scope_all: >-
      {{
        not (
          cleanup_destroy_ad_server | default(false) | bool or
          cleanup_destroy_idm | default(false) | bool or
          cleanup_destroy_mirror_registry | default(false) | bool or
          cleanup_destroy_bastion | default(false) | bool or
          cleanup_destroy_openshift_cluster | default(false) | bool or
          cleanup_destroy_idm_certs | default(false) | bool or
          cleanup_destroy_lab_networking | default(false) | bool
        )
      }}
    # Child cleanup should not run after a parent teardown has removed or is
    # about to remove the resources it depends on.
    cleanup_idm_certs_prereqs_available: >-
      {{
        not (
          cleanup_destroy_bastion | default(false) | bool or
          cleanup_destroy_idm | default(false) | bool or
          cleanup_destroy_openshift_cluster | default(false) | bool
        )
      }}

  roles:
    - role: openshift_post_install_idm_certs_cleanup
      when:
        - cleanup_scope_all or (cleanup_destroy_idm_certs | default(false) | bool)
        - cleanup_idm_certs_prereqs_available
      tags:
        - openshift_post_install_idm_certs_cleanup

- name: Clean up the lab switch and OVS networking
  hosts: aws_metal
  become: true
  gather_facts: "{{ cleanup_scope_all or (cleanup_destroy_lab_networking | default(false) | bool) }}"
  vars_files:
    - ../../vars/global/lab_switch_ports.yml
  vars:
    cleanup_scope_all: >-
      {{
        not (
          cleanup_destroy_ad_server | default(false) | bool or
          cleanup_destroy_idm | default(false) | bool or
          cleanup_destroy_mirror_registry | default(false) | bool or
          cleanup_destroy_bastion | default(false) | bool or
          cleanup_destroy_openshift_cluster | default(false) | bool or
          cleanup_destroy_idm_certs | default(false) | bool or
          cleanup_destroy_lab_networking | default(false) | bool
        )
      }}
    lab_bridge_name: lab-switch
    lab_switch_name: lab-switch
    lab_switch_xml_path: /etc/libvirt/lab-switch.xml
    lab_domain: workshop.lan
    lab_uplink_interface: "{{ ansible_default_ipv4.interface }}"
    lab_cleanup_remove_artifacts: true
    lab_routed_ports: >-
      {{ lab_switch_ports | dict2items
      | selectattr('value.routable', 'equalto', true)
      | list }}

  roles:
    - role: lab_cleanup
      when: cleanup_scope_all or (cleanup_destroy_lab_networking | default(false) | bool)
      tags:
        - lab_cleanup
